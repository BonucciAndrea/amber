<!DOCTYPE html>
<html lang="en" data-theme="amber">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Amber Notebook — Classic</title>
<style>
/* ---- shared core: editor overlay, syntax colors, output grids, toast ---- */
:root{
  --mono:"SF Mono",ui-monospace,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
  --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
.nb-ed{position:relative;font-family:var(--mono);font-size:13.5px;line-height:1.5}
.nb-hl,.nb-ed textarea{margin:0;padding:10px 12px;font-family:inherit;font-size:inherit;line-height:inherit;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;border:0;tab-size:2}
.nb-hl{position:absolute;inset:0;pointer-events:none;color:var(--s-var);z-index:0;overflow:hidden}
.nb-ed textarea{position:relative;display:block;width:100%;min-height:22px;background:transparent;color:transparent;caret-color:var(--caret);resize:none;outline:none;z-index:1;overflow:hidden}
.nb-ed textarea::selection{background:var(--selbg)}
.nb-ed textarea::placeholder{color:var(--faint);opacity:.7}
.hl-num{color:var(--s-num)}.hl-str{color:var(--s-str)}.hl-sym{color:var(--s-sym)}
.hl-verb{color:var(--s-verb)}.hl-adv{color:var(--s-adv)}.hl-kw{color:var(--s-kw)}
.hl-var{color:var(--s-var)}.hl-com{color:var(--s-com);font-style:italic}.hl-brk{color:var(--s-brk)}

/* output */
.nb-out{font-family:var(--mono);font-size:13px;color:var(--ink);overflow:auto}
.nb-out.empty{display:none}
.nb-out pre.console{margin:0 0 6px;color:var(--dim);white-space:pre-wrap}
.nb-out pre.ret{margin:0;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.nb-out .err{color:var(--err);font-family:var(--mono);white-space:pre-wrap}
.gridwrap{overflow:auto}
table.grid{border-collapse:collapse;font-family:var(--mono);font-size:12.5px;margin:0}
table.grid th{ text-align:left;color:var(--accent2);font-weight:600;padding:2px 14px 4px 0;border-bottom:1px solid var(--line);white-space:nowrap}
table.grid th.r,table.grid td.r{text-align:right}
table.grid td{padding:2px 14px 2px 0;color:var(--ink);white-space:nowrap;border-bottom:1px solid var(--line2)}
table.grid td.keyw,table.grid th.keyw{color:var(--s-sym)}
table.dictgrid td.k{color:var(--s-sym);padding-right:10px}
table.grid tr:last-child td{border-bottom:0}
.att{display:inline-block;margin-left:5px;padding:0 4px;font-size:9px;border-radius:4px;background:var(--selbg);color:var(--accent);vertical-align:middle}
.typ{margin-top:5px;font-size:10.5px;color:var(--faint);font-family:var(--ui)}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 16px;font:13px var(--ui);opacity:0;pointer-events:none;transition:.22s;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbars */
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}
::-webkit-scrollbar-track{background:transparent}

html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);overflow:hidden}
#top{height:52px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:30}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.3px}
.brand .gem{color:var(--accent);font-size:17px;filter:drop-shadow(0 0 6px var(--accent))}
.brand small{font-weight:500;color:var(--faint);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.sp{flex:1}
.tbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border:1px solid var(--line);background:var(--cell);color:var(--ink);border-radius:8px;font:13px var(--ui);cursor:pointer;transition:.15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.tbtn.primary:hover{filter:brightness(1.08);color:var(--bg)}
.tsw{width:15px;height:15px;border-radius:4px;background:var(--accent);box-shadow:var(--glow)}
#main{display:flex;height:calc(100% - 52px)}
#side{width:290px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:margin-left .2s}
#side.hide{margin-left:-290px}
.sidehd{padding:12px 14px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint)}
.search{margin:0 12px 8px}
.search input{width:100%;height:32px;padding:0 11px;border:1px solid var(--line);background:var(--cell);color:var(--ink);border-radius:8px;font:13px var(--mono);outline:none}
.search input:focus{border-color:var(--accent)}
#exlist{flex:1;overflow:auto;padding:2px 8px 20px}
.excat{margin:10px 6px 4px;font-size:10.5px;font-weight:700;letter-spacing:.6px;color:var(--accent2);text-transform:uppercase}
.exitem{padding:7px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:.12s}
.exitem:hover{background:var(--cell);border-color:var(--line)}
.exitem .exn{font-size:12.5px;color:var(--ink)}
.exitem .exc{font:11px var(--mono);color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#scrollhost{flex:1;overflow:auto}
#doc{max-width:900px;margin:0 auto;padding:26px 24px 200px}
.doch{margin:0 0 18px}
.doch h1{margin:0;font-size:21px;font-weight:700}
.doch p{margin:5px 0 0;color:var(--dim);font-size:13.5px}
.nb-cell{display:flex;gap:12px;margin:14px 0;border:1px solid var(--line);border-radius:12px;background:var(--cell);padding:8px 12px 10px;transition:border-color .15s,box-shadow .15s}
.nb-cell.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--glow)}
.nb-gutter{display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:2px;width:34px;flex-shrink:0}
.nb-run{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--accent);cursor:pointer;font-size:11px;transition:.15s}
.nb-run:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.nb-count{font:10px var(--mono);color:var(--faint)}
.nb-ord{font:10px var(--mono);color:var(--line);margin-top:auto}
.nb-main{flex:1;min-width:0}
.nb-ed{border-radius:7px}
.nb-out{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line2)}
.nb-tools{display:flex;gap:5px;margin-top:8px;opacity:0;transition:.15s}
.nb-cell:hover .nb-tools,.nb-cell.active .nb-tools{opacity:1}
.nb-tools button{height:24px;padding:0 8px;font:11px var(--ui);border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:6px;cursor:pointer}
.nb-tools button:hover{color:var(--accent);border-color:var(--accent)}
.nb-sp{flex:1}
.addbar{text-align:center;margin:16px 0}
.addbar button{height:34px;padding:0 18px;border:1px dashed var(--line);background:transparent;color:var(--dim);border-radius:9px;cursor:pointer;font:13px var(--ui)}
.addbar button:hover{border-color:var(--accent);color:var(--accent)}
/* theme popover */
#pop{position:absolute;top:48px;right:14px;width:330px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;display:none;grid-template-columns:1fr 1fr;gap:9px;z-index:40;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#pop.open{display:grid}
.tcard{border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s}
.tcard:hover{transform:translateY(-2px)}
.tcard.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.tprev{padding:12px 10px;display:flex;align-items:center;gap:5px;font:12px var(--mono)}
.tdot{width:9px;height:9px;border-radius:50%;margin-right:3px}
.tcard .nm{padding:6px 10px;font-size:12px;background:var(--cell)}
@media(max-width:760px){#side{position:absolute;z-index:20;height:100%}#doc{padding:18px 14px 200px}}
</style>
</head>
<body>
<div id="top">
  <div class="brand"><span class="gem">◆</span> Amber <small>Notebook</small></div>
  <button class="tbtn" id="btnSide">☰ Examples</button>
  <div class="sp"></div>
  <button class="tbtn" id="btnRunAll">▶▶ Run all</button>
  <button class="tbtn" id="btnClear">Clear</button>
  <button class="tbtn" id="btnTheme"><span class="tsw" id="tsw"></span> <span id="tname">Amber</span></button>
</div>
<div id="pop"></div>
<div id="main">
  <aside id="side">
    <div class="sidehd">Examples · click to run</div>
    <div class="search"><input id="exsearch" placeholder="filter examples…"/></div>
    <div id="exlist"></div>
  </aside>
  <div id="scrollhost">
    <div id="doc">
      <div class="doch"><h1>Amber Notebook</h1><p>A real Amber interpreter in your browser. Type a statement and press <b>Ctrl/⌘ + Enter</b> — or pick an example on the left. Everything runs locally, including qSQL.</p></div>
      <div id="cells"></div>
      <div class="addbar"><button id="btnAdd">＋ Add cell</button></div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>// ============================================================================
// Amber interpreter — a browser/Node evaluator for a working subset of Amber
// (the q/kdb+-style array language).  Right-to-left evaluation, ints/floats/
// chars/symbols/lists/dicts/tables, verbs, adverbs, lambdas, indexing,
// assignment, column attributes, and a slice of the Amber vocabulary.
// ============================================================================
(function (root) {
  'use strict';

  // ---- value model -------------------------------------------------------
  // atoms:   {t:'i'|'f'|'c'|'s', v}
  // vectors: {t:'I'|'F'|'C'|'S'|'A', v:[...], at?}    C -> v is a JS string
  // dict:    {t:'m', k:<vec>, v:<vec/list>}
  // table:   {t:'T', c:[names], d:[colvals], at:[attr]}
  // keyed:   {t:'K', kt:<table>, vt:<table>}
  // lambda:  {t:'fn', p:[names], b:<terms>, src, rank}
  // verb:    {t:'vb', n, mon, dy}
  // proj:    {t:'pr', f, args, need}
  // unit/::  {t:'u'}
  const U = { t: 'u' };
  const I = (v) => ({ t: 'i', v: v | 0 });
  const F = (v) => ({ t: 'f', v: +v });
  const Ch = (v) => ({ t: 'c', v: v });
  const Sy = (v) => ({ t: 's', v: v });

  function isAtom(x) { return x && 'ifcsu'.indexOf(x.t) >= 0; }
  function isVec(x) { return x && 'IFCSA'.indexOf(x.t) >= 0; }
  function isNum(x) { return x && (x.t === 'i' || x.t === 'f'); }
  function isNumVec(x) { return x && (x.t === 'I' || x.t === 'F'); }

  function len(x) {
    if (isVec(x)) return x.t === 'C' ? x.v.length : x.v.length;
    if (x.t === 'm') return len(x.k);
    if (x.t === 'T') return x.d.length ? len(x.d[0]) : 0;
    if (x.t === 'K') return len(x.kt);
    return 1;
  }

  // JS array of element *values* from a vector
  function arr(x) {
    if (x.t === 'C') return x.v.split('').map(Ch);
    if (x.t === 'S') return x.v.map(Sy);
    if (x.t === 'I') return x.v.map(I);
    if (x.t === 'F') return x.v.map(F);
    if (x.t === 'A') return x.v.slice();
    if (isAtom(x)) return [x];
    return [x];
  }
  // raw JS primitives
  function raw(x) {
    if (x.t === 'C') return x.v.split('');
    if (x.t === 'S' || x.t === 'I' || x.t === 'F' || x.t === 'A') return x.v.slice();
    return [x.v];
  }

  // build a best-typed vector from an array of *values*
  function vec(vals) {
    if (vals.length === 0) return { t: 'A', v: [] };
    let allc = true, alls = true, alli = true, allf = true;
    for (const e of vals) {
      if (!e || e.t === undefined) { allc = alls = alli = allf = false; break; }
      if (e.t !== 'c') allc = false;
      if (e.t !== 's') alls = false;
      if (e.t !== 'i') alli = false;
      if (e.t !== 'i' && e.t !== 'f') allf = false;
    }
    if (allc) return { t: 'C', v: vals.map(e => e.v).join('') };
    if (alls) return { t: 'S', v: vals.map(e => e.v) };
    if (alli) return { t: 'I', v: vals.map(e => e.v) };
    if (allf) return { t: 'F', v: vals.map(e => +e.v) };
    return { t: 'A', v: vals.slice() };
  }
  // build numeric vector, choosing int vs float
  function nvec(nums) {
    let allint = true;
    for (const n of nums) if (!Number.isInteger(n)) { allint = false; break; }
    return allint ? { t: 'I', v: nums.map(n => n | 0) } : { t: 'F', v: nums.map(n => +n) };
  }

  function num(x) {
    if (x.t === 'i' || x.t === 'f') return x.v;
    if (x.t === 'c') return x.v.charCodeAt(0);
    throw err('type');
  }
  function err(m) { const e = new Error(m); e.amber = true; return e; }
  function isNull(x) {
    if (x.t === 'i') return x.v === -9223372036854775807 || x.v === null;
    if (x.t === 'f') return Number.isNaN(x.v);
    if (x.t === 'c') return x.v === ' ';
    if (x.t === 's') return x.v === '';
    return false;
  }
  const NF = { t: 'f', v: NaN };            // 0n
  const NI = { t: 'i', v: -9223372036854775807 }; // 0N

  // ---- lexer -------------------------------------------------------------
  const VERBCH = "+-*%!&|<>=~,^#_$?@.";
  function lex(s) {
    const T = [];
    let i = 0, n = s.length;
    const prevNoun = () => {
      // look at last meaningful token
      for (let j = T.length - 1; j >= 0; j--) {
        const t = T[j];
        return t.k === 'num' || t.k === 'name' || t.k === 'str' || t.k === 'sym' ||
          t.k === 'symv' || t.v === ')' || t.v === ']' || t.v === '}';
      }
      return false;
    };
    while (i < n) {
      let c = s[i];
      if (c === ' ' || c === '\t' || c === '\r') { i++; continue; }
      if (c === '\n' || c === ';') { T.push({ k: 'sep', v: c === '\n' ? ';' : ';' }); i++; continue; }
      if (c === '/' && (i === 0 || s[i - 1] === '\n' || s[i - 1] === ' ' || s[i - 1] === '\t')) {
        // line comment to EOL
        while (i < n && s[i] !== '\n') i++;
        continue;
      }
      if (c === '"') { // string
        let j = i + 1, out = '';
        while (j < n && s[j] !== '"') {
          if (s[j] === '\\') {
            const e = s[j + 1];
            out += e === 'n' ? '\n' : e === 't' ? '\t' : e === 'r' ? '\r' :
              e === '0' ? '\0' : e === '\\' ? '\\' : e === '"' ? '"' : e;
            j += 2;
          } else { out += s[j]; j++; }
        }
        i = j + 1; T.push({ k: 'str', v: out }); continue;
      }
      if (c === '`') { // symbol or symbol vector
        const syms = [];
        while (s[i] === '`') {
          i++;
          let nm = '';
          if (s[i] === '"') { // quoted symbol
            i++;
            while (i < n && s[i] !== '"') { nm += s[i]; i++; }
            i++;
          } else {
            while (i < n && /[A-Za-z0-9.]/.test(s[i])) { nm += s[i]; i++; }
          }
          syms.push(nm);
          // allow immediate backtick chain w/o space
        }
        if (syms.length === 1) T.push({ k: 'sym', v: syms[0] });
        else T.push({ k: 'symv', v: syms });
        continue;
      }
      // number / number-vector
      // a leading '-' is a negative sign iff glued to a digit AND preceded by whitespace/start/delimiter/verb
      // (so `sums -1` is the literal -1, while `x-1` and `1-1` are subtraction).
      const negOK = (k) => { const pc = k === 0 ? '' : s[k - 1]; return pc === '' || ' \t\n\r([{;'.indexOf(pc) >= 0 || VERBCH.indexOf(pc) >= 0 || "/\\'".indexOf(pc) >= 0; };
      const startsNum = (ch, k) => /[0-9]/.test(ch) ||
        (ch === '.' && /[0-9]/.test(s[k + 1] || '')) ||
        (ch === '-' && (/[0-9]/.test(s[k + 1] || '') || (s[k + 1] === '.' && /[0-9]/.test(s[k + 2] || ''))) && negOK(k));
      // boolean literal: 0b, 1b, 101b (contiguous 0/1 digits + b)
      if (/[01]/.test(c)) {
        const bm = /^[01]+b(?![0-9A-Za-z.:])/.exec(s.slice(i));
        if (bm) { T.push({ k: 'num', v: bm[0].slice(0, -1).split('').map(Number) }); i += bm[0].length; continue; }
      }
      if (startsNum(c, i)) {
        const nums = [];
        while (true) {
          // read one number (with optional glued sign)
          let j = i, sign = 1;
          if (s[j] === '-') { sign = -1; j++; }
          let numstr = '';
          if (s.substr(j, 2) === '0N') { nums.push(NaN); j += 2; i = j; }
          else if (s.substr(j, 2) === '0n') { nums.push(NaN); j += 2; i = j; }
          else if (s.substr(j, 2) === '0w') { nums.push(sign * Infinity); j += 2; i = j; }
          else {
            while (j < n && /[0-9.eE]/.test(s[j])) {
              if ((s[j] === 'e' || s[j] === 'E') && (s[j + 1] === '-' || s[j + 1] === '+')) { numstr += s[j] + s[j + 1]; j += 2; continue; }
              numstr += s[j]; j++;
            }
            nums.push(sign * parseFloat(numstr));
            i = j;
          }
          // continue vector? space then another number glued with sign or digit
          let k = i;
          if (s[k] === ' ') {
            let m = k; while (s[m] === ' ') m++;
            if (/[0-9]/.test(s[m] || '') || (s[m] === '-' && /[0-9.]/.test(s[m + 1] || '')) ||
              (s[m] === '.' && /[0-9]/.test(s[m + 1] || '')) || s.substr(m, 2) === '0N' || s.substr(m, 2) === '0n' || s.substr(m, 2) === '0w') {
              i = m; continue;
            }
          }
          break;
        }
        // trailing 'b' turns a 0/1 vector into a boolean vector (e.g. 1 0 1b)
        if (s[i] === 'b' && !/[0-9A-Za-z.]/.test(s[i + 1] || '') && nums.length > 1 && nums.every(x => x === 0 || x === 1)) i++;
        T.push({ k: 'num', v: nums }); continue;
      }
      if (/[A-Za-z]/.test(c)) { // name
        let nm = '';
        while (i < n && /[A-Za-z0-9]/.test(s[i])) { nm += s[i]; i++; }
        // dotted names a.b
        while (s[i] === '.' && /[A-Za-z]/.test(s[i + 1] || '')) {
          nm += s[i]; i++;
          while (i < n && /[A-Za-z0-9]/.test(s[i])) { nm += s[i]; i++; }
        }
        T.push({ k: 'name', v: nm }); continue;
      }
      // adverbs
      if (c === "'" && s[i + 1] === ':') { T.push({ k: 'adv', v: "':" }); i += 2; continue; }
      if (c === '/' && s[i + 1] === ':') { T.push({ k: 'adv', v: '/:' }); i += 2; continue; }
      if (c === '\\' && s[i + 1] === ':') { T.push({ k: 'adv', v: '\\:' }); i += 2; continue; }
      if (c === "'") { T.push({ k: 'adv', v: "'" }); i++; continue; }
      if (c === '/') { T.push({ k: 'adv', v: '/' }); i++; continue; }
      if (c === '\\') { T.push({ k: 'adv', v: '\\' }); i++; continue; }
      // multi-char verbs 0: 1:
      if ((c === '0' || c === '1') && s[i + 1] === ':') { T.push({ k: 'verb', v: c + ':' }); i += 2; continue; }
      // assignment ::  and :
      if (c === ':' && s[i + 1] === ':') { T.push({ k: 'gassign', v: '::' }); i += 2; continue; }
      if (c === ':') { T.push({ k: 'assign', v: ':' }); i++; continue; }
      if (VERBCH.indexOf(c) >= 0) { T.push({ k: 'verb', v: c }); i++; continue; }
      if (c === '(') { T.push({ k: 'open', v: '(' }); i++; continue; }
      if (c === ')') { T.push({ k: 'close', v: ')' }); i++; continue; }
      if (c === '[') { T.push({ k: 'obrk', v: '[' }); i++; continue; }
      if (c === ']') { T.push({ k: 'cbrk', v: ']' }); i++; continue; }
      if (c === '{') { T.push({ k: 'obrc', v: '{' }); i++; continue; }
      if (c === '}') { T.push({ k: 'cbrc', v: '}' }); i++; continue; }
      throw err('lex:' + c);
    }
    return T;
  }

  // ---- parser: token stream -> list of statements, each a list of terms --
  // term kinds: {k:'val',v} {k:'name',n} {k:'verb',v} {k:'adv',a,of}
  //   {k:'paren',e} {k:'list',es} {k:'brack',args} {k:'lambda',...}
  //   {k:'assign',name,g} {k:'idxassign',...}
  function parse(tokens) {
    let p = 0;
    function peek() { return tokens[p]; }
    function next() { return tokens[p++]; }

    // parse a sequence of terms until a stopper (close/cbrk/cbrc/sep at depth)
    function parseTerms(stopset) {

    let i=0,n=src.length,out='';
    const push=(cls,txt)=>{ out+= cls?('<span class="hl-'+cls+'">'+esc(txt)+'</span>'):esc(txt); };
    while(i<n){ const c=src[i];
      if(c==='/'&&(i===0||src[i-1]==='\n'||src[i-1]===' '||src[i-1]==='\t')){ let j=i; while(j<n&&src[j]!=='\n')j++; push('com',src.slice(i,j)); i=j; continue; }
      if(c==='"'){ let j=i+1; while(j<n&&src[j]!=='"'){ if(src[j]==='\\')j++; j++; } j++; push('str',src.slice(i,Math.min(j,n))); i=Math.min(j,n); continue; }
      if(c==='\''){ /* backtick handled below */ }
      if(c==='`'){ let j=i; while(j<n&&(src[j]==='`'||/[A-Za-z0-9.]/.test(src[j])||src[j]==='"')){ if(src[j]==='"'){ j++; while(j<n&&src[j]!=='"')j++; } j++; } push('sym',src.slice(i,j)); i=j; continue; }
      if(/[0-9]/.test(c)||(c==='.'&&/[0-9]/.test(src[i+1]||''))||(c==='-'&&/[0-9]/.test(src[i+1]||'')&&!/[A-Za-z0-9.)\]]/.test((src[i-1]||' ')))){
        let j=i; if(src[j]==='-')j++; while(j<n&&/[0-9.eE]/.test(src[j]))j++;
        while(src[j]===' '&&(/[0-9]/.test(src[j+1]||'')||(src[j+1]==='-'&&/[0-9.]/.test(src[j+2]||'')))){ j++; if(src[j]==='-')j++; while(j<n&&/[0-9.eE]/.test(src[j]))j++; }
        if(src[j]==='b'&&!/[0-9A-Za-z.]/.test(src[j+1]||''))j++;
        push('num',src.slice(i,j)); i=j; continue;
      }
      if(/[A-Za-z]/.test(c)){ let j=i; while(j<n&&/[A-Za-z0-9.]/.test(src[j]))j++; const nm=src.slice(i,j); push(BUILTINS.has(nm)?'kw':'var',nm); i=j; continue; }
      if(c==="'"&&src[i+1]===':'){ push('adv',"':"); i+=2; continue; }
      if((c==='/'||c==='\\')&&src[i+1]===':'){ push('adv',c+':'); i+=2; continue; }
      if(c==="'"||c==='/'||c==='\\'){ push('adv',c); i++; continue; }
      if(c===':'&&src[i+1]===':'){ push('verb','::'); i+=2; continue; }
      if(VERBCH.indexOf(c)>=0){ push('verb',c); i++; continue; }
      if('()[]{}'.indexOf(c)>=0){ push('brk',c); i++; continue; }
      if(c===';'){ push('brk',';'); i++; continue; }
      push(null,c); i++;
    }
    return out+'\n';
  }

  function cell(txt,cls){ const td=document.createElement('td'); if(cls)td.className=cls; td.textContent=txt; return td; }

<script>/* Shared notebook engine. Mounts stacked cells into a host element.
   Cell markup uses class hooks (.nb-*) that each UI shell styles differently. */
(function () {
  "use strict";
  const AK = window.AK, A = AK.A;

  function wireEditor(ta, hl, onRun) {
    function sync() { hl.innerHTML = AK.highlight(ta.value); ta.style.height = 'auto'; ta.style.height = Math.max(ta.scrollHeight, 22) + 'px'; }
    ta.addEventListener('input', sync);
    ta.addEventListener('scroll', () => { hl.scrollTop = ta.scrollTop; hl.scrollLeft = ta.scrollLeft; });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.shiftKey || e.metaKey || e.ctrlKey)) { e.preventDefault(); onRun(e.shiftKey && !(e.metaKey || e.ctrlKey)); }
      if (e.key === 'Tab') { e.preventDefault(); const s = ta.selectionStart, en = ta.selectionEnd; ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(en); ta.selectionStart = ta.selectionEnd = s + 2; sync(); }
    });
    return sync;
  }

  window.NB = function (host, opts) {
    opts = opts || {};
    const cells = []; let counter = 0;
    function renumber() { cells.forEach((c, i) => c.ord && (c.ord.textContent = (i + 1))); }

    function make(src, at) {
      const el = document.createElement('div'); el.className = 'nb-cell';
      el.innerHTML =
        '<div class="nb-gutter"><button class="nb-run" title="Run (Ctrl/⌘+Enter)">▶</button><span class="nb-count"></span><span class="nb-ord"></span></div>' +
        '<div class="nb-main">' +
        '<div class="nb-ed"><pre class="nb-hl" aria-hidden="true"></pre><textarea spellcheck="false" autocapitalize="off" autocomplete="off" wrap="soft" placeholder="type Amber… Ctrl/⌘+Enter to run"></textarea></div>' +
        '<div class="nb-out empty"></div>' +
        '<div class="nb-tools"><button data-a="copyin">⧉ in</button><button data-a="copyout">⧉ out</button><span class="nb-sp"></span>' +
        '<button data-a="up" title="move up">↑</button><button data-a="down" title="move down">↓</button>' +
        '<button data-a="add" title="add below">＋</button><button data-a="del" title="delete">✕</button></div>' +
        '</div>';
      const ta = el.querySelector('textarea'), hl = el.querySelector('.nb-hl'), out = el.querySelector('.nb-out');
      const count = el.querySelector('.nb-count'), ord = el.querySelector('.nb-ord');
      const obj = { el, ta, hl, out, count, ord, res: null };
      ta.value = src || '';
      const sync = wireEditor(ta, hl, (adv) => { run(obj); if (adv) focusNext(obj); });
      el.querySelector('.nb-run').onclick = () => run(obj);
      el.querySelector('[data-a=copyin]').onclick = () => AK.copyText(ta.value, 'input copied');
      el.querySelector('[data-a=copyout]').onclick = () => AK.copyText(obj.res ? AK.outText(obj.res) : '', 'output copied');
      el.querySelector('[data-a=add]').onclick = () => { const c = make('', idx(obj) + 1); c.ta.focus(); };
      el.querySelector('[data-a=del]').onclick = () => remove(obj);
      el.querySelector('[data-a=up]').onclick = () => move(obj, -1);
      el.querySelector('[data-a=down]').onclick = () => move(obj, 1);
      ta.addEventListener('focus', () => { cells.forEach(c => c.el.classList.remove('active')); el.classList.add('active'); });

      const pos = (at == null || at >= cells.length) ? cells.length : at;
      if (pos >= cells.length) { host.appendChild(el); cells.push(obj); }
      else { host.insertBefore(el, cells[pos].el); cells.splice(pos, 0, obj); }
      setTimeout(sync, 0); renumber();
      return obj;
    }
    function idx(o) { return cells.indexOf(o); }
    function focusNext(o) { const i = idx(o); if (i === cells.length - 1) { const c = make(''); c.ta.focus(); } else cells[i + 1].ta.focus(); }
    function run(obj) { const res = A.run(obj.ta.value); obj.res = res; AK.renderInto(obj.out, res); counter++; obj.count.textContent = '[' + counter + ']'; if (opts.onRun) opts.onRun(res); }
    function remove(obj) { const i = idx(obj); if (i < 0) return; obj.el.remove(); cells.splice(i, 1); if (!cells.length) make(''); renumber(); }
    function move(obj, dir) { const i = idx(obj), j = i + dir; if (j < 0 || j >= cells.length) return; cells.splice(i, 1); cells.splice(j, 0, obj); if (dir > 0) host.insertBefore(cells[j].el, cells[j + 1] ? cells[j + 1].el.nextSibling : null); host.insertBefore(obj.el, cells[j + 1] ? cells[j + 1].el : null); renumber(); reorderDom(); }
    function reorderDom() { cells.forEach(c => host.appendChild(c.el)); }
    function runAll() { cells.forEach(run); }
    function clearAll() { cells.slice().forEach(c => { c.el.remove(); }); cells.length = 0; make(''); }
    function insert(code, autorun) { const c = make(code); if (autorun !== false) run(c); c.el.scrollIntoView({ behavior: 'smooth', block: 'center' }); c.ta.focus(); return c; }

    return { make, run, runAll, clearAll, insert, cells, reorderDom };
  };
})();
</script>

  function buildEx(filter){const host=$('exlist');host.innerHTML='';const f=(filter||'').toLowerCase();const cats=[];
    AK.EXAMPLES.forEach(e=>{if(cats.indexOf(e[0])<0)cats.push(e[0]);});
    cats.forEach(cat=>{const items=AK.EXAMPLES.filter(e=>e[0]===cat&&(!f||(e[1]+' '+e[2]+' '+e[0]).toLowerCase().includes(f)));if(!items.length)return;
      const h=document.createElement('div');h.className='excat';h.textContent=cat;host.appendChild(h);
      items.forEach(e=>{const d=document.createElement('div');d.className='exitem';d.innerHTML='<div class="exn"></div><div class="exc"></div>';
        d.querySelector('.exn').textContent=e[1];d.querySelector('.exc').textContent=e[2].replace(/\n/g,' · ');
        d.onclick=()=>nb.insert(e[2]);host.appendChild(d);});});}
  buildEx('');$('exsearch').addEventListener('input',e=>buildEx(e.target.value));
  $('btnSide').onclick=()=>$('side').classList.toggle('hide');
  $('btnRunAll').onclick=()=>nb.runAll();
  $('btnClear').onclick=()=>nb.clearAll();
  $('btnAdd').onclick=()=>{const c=nb.make('');c.ta.focus();};
})();
</script>
</body>
