<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amber Notepad</title>
<style>
  :root{
    --bg:#1a1510; --panel:#211a12; --cell:#1e1710; --line:#3a2c1a; --line2:#2c2115;
    --ink:#f4dcae; --dim:#c39d5f; --faint:#8a6d3b;
    --accent:#ffb000; --accent2:#ff8c1a; --ok:#8fd06b; --err:#ff6b4a;
    --glow:0 0 10px rgba(255,176,0,.22); --radius:12px;
    --s-num:#ffe08a; --s-str:#ffd27f; --s-sym:#ff9440; --s-verb:#ff9e3d; --s-adv:#ffbe5c;
    --s-kw:#ffcf6b; --s-var:#e6c078; --s-com:#7d6636; --s-brk:#c79a4a;
    --caret:#ffb000; --selbg:rgba(255,176,0,.24);
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,"DejaVu Sans Mono",monospace;
    --ui: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --fs:13.5px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;
    -webkit-font-smoothing:antialiased;transition:background .35s ease,color .35s ease;overflow:hidden}
  ::selection{background:var(--selbg)}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:7px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--faint)}
  button,input,select{font-family:inherit}
  .app{display:flex;flex-direction:column;height:100vh}

  /* ---------- top bar ---------- */
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel),var(--bg));position:relative;z-index:30;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px;user-select:none}
  .gem{width:24px;height:24px;transform:rotate(45deg);border-radius:5px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent2) 60%,#8a4d00);
    box-shadow:0 0 14px 1px color-mix(in srgb,var(--accent) 55%,transparent),inset 0 0 7px rgba(255,255,255,.4)}
  .word{font-family:var(--mono);font-weight:800;letter-spacing:.36em;font-size:18px;color:var(--accent);
    text-shadow:var(--glow);padding-left:.36em}
  .sub{font-size:10px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase;margin-top:2px}
  .grow{flex:1}
  .toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--ui);font-size:12.5px;color:var(--ink);background:var(--cell);
    border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;transition:.14s;white-space:nowrap;display:inline-flex;gap:6px;align-items:center}
  .btn:hover{border-color:var(--accent);color:#fff;box-shadow:var(--glow)}
  .btn:active{transform:translateY(1px)}
  .btn.pri{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 26%,var(--cell)),var(--cell));
    border-color:color-mix(in srgb,var(--accent) 50%,var(--line));color:#fff;font-weight:600}
  .btn.pri:hover{box-shadow:0 0 0 1px var(--accent),var(--glow)}
  .seg{display:flex;background:var(--cell);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:transparent;color:var(--dim);padding:7px 13px;cursor:pointer;font-size:12.5px;transition:.14s}
  .seg button.on{background:color-mix(in srgb,var(--accent) 20%,var(--cell));color:#fff}
  .seg button:hover:not(.on){color:var(--ink)}

  /* theme picker */
  .themewrap{position:relative}
  .themebtn{display:flex;align-items:center;gap:8px}
  .swatch{width:14px;height:14px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
  .thememenu{position:absolute;top:calc(100% + 8px);right:0;width:330px;max-height:70vh;overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;z-index:60;
    box-shadow:0 24px 60px rgba(0,0,0,.5);display:none;grid-template-columns:1fr 1fr;gap:8px}
  .thememenu.open{display:grid}
  .tcard{display:flex;flex-direction:column;gap:7px;padding:9px;border-radius:10px;border:1px solid var(--line2);
    cursor:pointer;background:var(--cell);transition:.14s}
  .tcard:hover{border-color:var(--accent);transform:translateY(-1px)}
  .tcard.on{border-color:var(--accent);box-shadow:var(--glow)}
  .tcard .nm{font-size:11.5px;font-weight:600}
  .tprev{height:34px;border-radius:7px;display:flex;align-items:center;padding:0 8px;gap:4px;font-family:var(--mono);font-size:11px;overflow:hidden}
  .tdot{width:8px;height:8px;border-radius:50%}

  /* ---------- body split ---------- */
  .split{display:flex;flex:1;min-height:0}
  .work{flex:1;min-width:0;overflow:auto;padding:22px 22px 60px}
  .side{width:340px;flex:0 0 auto;border-left:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;min-height:0;transition:margin .25s ease}
  .side.hidden{margin-right:-341px}
  .side h3{margin:0;padding:14px 16px 10px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
    border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
  .searchwrap{padding:10px 12px;border-bottom:1px solid var(--line2)}
  .search{width:100%;background:var(--cell);border:1px solid var(--line);border-radius:9px;color:var(--ink);
    padding:8px 11px;font-size:13px;outline:none}
  .search:focus{border-color:var(--accent);box-shadow:var(--glow)}
  .exlist{overflow:auto;padding:8px 10px 40px;flex:1}
  .excat{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:12px 4px 5px}
  .ex{display:block;width:100%;text-align:left;margin:4px 0;padding:8px 10px;border-radius:9px;border:1px solid var(--line2);
    background:var(--cell);cursor:pointer;transition:.13s}
  .ex:hover{border-color:var(--accent);box-shadow:var(--glow);transform:translateX(2px)}
  .ex .exl{font-size:12.5px;color:var(--ink);font-weight:600;margin-bottom:3px}
  .ex .exc{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- cells (notebook) ---------- */
  .cells{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .cell{border:1px solid var(--line2);border-radius:var(--radius);background:var(--cell);overflow:hidden;transition:.15s}
  .cell:focus-within{border-color:var(--accent);box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent),var(--glow)}
  .chead{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 6px;border-bottom:1px solid var(--line2);background:var(--panel)}
  .run{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;
    color:var(--accent);border:1px solid var(--line);background:var(--cell);flex:0 0 auto;font-size:12px;transition:.13s}
  .run:hover{color:#fff;border-color:var(--accent);box-shadow:var(--glow)}
  .idx{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:30px}
  .cgrow{flex:1}
  .mini{width:26px;height:24px;border:1px solid var(--line);background:var(--cell);color:var(--dim);border-radius:7px;
    cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:.13s}
  .mini:hover{color:var(--ink);border-color:var(--accent)}
  .editor{position:relative}
  .editor pre,.editor textarea{margin:0;padding:12px 14px;font-family:var(--mono);font-size:var(--fs);line-height:1.6;
    white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;border:0;tab-size:2}
  .editor pre{position:absolute;inset:0;pointer-events:none;color:var(--ink);z-index:1}
  .editor textarea{position:relative;z-index:2;width:100%;background:transparent;color:transparent;caret-color:var(--caret);
    resize:none;outline:none;display:block;min-height:24px;overflow:hidden}
  .out{border-top:1px solid var(--line2);padding:10px 14px;background:color-mix(in srgb,var(--bg) 60%,var(--cell))}
  .out.empty{display:none}
  .out pre{margin:0;white-space:pre;overflow-x:auto;font-family:var(--mono);font-size:13px;color:var(--ink)}
  .console{color:var(--dim)}
  .err{color:var(--err);white-space:pre-wrap;font-family:var(--mono);font-size:13px}
  .ret{color:var(--accent);font-family:var(--mono);font-size:13px;white-space:pre;overflow-x:auto}
  .typ{font-size:10.5px;color:var(--faint);margin-top:5px}
  .addcell{max-width:1000px;margin:14px auto 0;display:flex;justify-content:center}
  .addcell button{color:var(--dim);border:1px dashed var(--line);background:transparent;border-radius:10px;padding:8px 20px;cursor:pointer;transition:.14s}
  .addcell button:hover{color:var(--accent);border-color:var(--accent)}

  /* value grids */
  table.grid{border-collapse:collapse;font-family:var(--mono);font-size:12.5px;margin:2px 0}
  table.grid th{color:var(--accent);text-align:left;font-weight:600;padding:2px 14px 5px 2px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.grid td{padding:2px 14px 2px 2px;color:var(--ink);white-space:nowrap;vertical-align:top}
  table.grid td.r,table.grid th.r{text-align:right}
  table.grid .att{font-size:9px;color:var(--s-sym);letter-spacing:.1em;margin-left:5px;vertical-align:super}
  table.grid tr:hover td{background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .keyw{border-right:2px solid var(--line);padding-right:9px !important}
  .dictgrid td.k{color:var(--s-sym)}

  /* ---------- scratch mode ---------- */
  .scratch{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:14px;height:100%}
  .scratch .pane{border:1px solid var(--line2);border-radius:var(--radius);background:var(--cell);overflow:hidden;display:flex;flex-direction:column}
  .scratch .phead{padding:7px 12px;border-bottom:1px solid var(--line2);background:var(--panel);font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px}
  .scratch .ed{flex:1;min-height:220px}
  .scratch .editor{height:100%}
  .scratch .editor pre,.scratch .editor textarea{min-height:220px;height:100%}
  .scratch .console-pane{min-height:180px;max-height:44vh;overflow:auto;padding:10px 14px}
  .trow{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--line2)}
  .trow .tin{color:var(--s-var);font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;flex:0 0 46%}
  .trow .tout{font-family:var(--mono);font-size:12.5px;flex:1;min-width:0}
  .prompt{color:var(--accent);font-weight:700}

  /* ---------- status bar ---------- */
  .status{height:26px;display:flex;align-items:center;gap:16px;padding:0 16px;font-size:11px;color:var(--faint);
    background:var(--panel);border-top:1px solid var(--line2);flex:0 0 auto}
  .status b{color:var(--dim);font-weight:600}
  .kbd{border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--dim);font-size:10.5px;font-family:var(--mono)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);
    color:var(--ink);padding:9px 18px;border-radius:10px;box-shadow:var(--glow);z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;font-size:13px}
  .toast.show{opacity:1}

  /* ghost autocomplete */
  .ghost{color:var(--faint);opacity:.65;font-style:italic}
  .acbadge{position:absolute;right:8px;bottom:6px;font-size:9.5px;letter-spacing:.12em;color:var(--faint);
    background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;pointer-events:none;opacity:0;transition:.15s;z-index:3}
  .editor:focus-within .acbadge.show{opacity:.9}
  /* resizable splitters */
  .splitter{height:9px;flex:0 0 auto;cursor:row-resize;background:
    linear-gradient(180deg,transparent,var(--line2) 40%,var(--line2) 60%,transparent);position:relative}
  .splitter:hover,.splitter.drag{background:linear-gradient(180deg,transparent,var(--accent) 40%,var(--accent) 60%,transparent)}
  .splitter::after{content:"⋯";position:absolute;left:50%;top:-4px;transform:translateX(-50%);color:var(--faint);font-size:12px;letter-spacing:2px}
  .sidesplit{width:7px;flex:0 0 auto;cursor:col-resize;background:transparent;position:relative;z-index:20}
  .sidesplit:hover,.sidesplit.drag{background:linear-gradient(90deg,transparent,var(--accent) 45%,var(--accent) 55%,transparent)}
  /* copy buttons */
  .cpbtn{border:1px solid var(--line);background:var(--cell);color:var(--dim);border-radius:7px;cursor:pointer;
    font-size:10.5px;padding:3px 8px;transition:.13s;display:inline-flex;gap:4px;align-items:center}
  .cpbtn:hover{color:var(--accent);border-color:var(--accent)}
  .outbar{display:flex;gap:6px;justify-content:flex-end;margin-bottom:6px}
  /* syntax classes */
  .hl-com{color:var(--s-com);font-style:italic}
  .hl-str{color:var(--s-str)} .hl-sym{color:var(--s-sym)} .hl-num{color:var(--s-num)}
  .hl-verb{color:var(--s-verb);font-weight:600} .hl-adv{color:var(--s-adv);font-weight:600}
  .hl-brk{color:var(--s-brk)} .hl-kw{color:var(--s-kw)} .hl-var{color:var(--s-var)}
  @media(max-width:860px){.side{position:fixed;right:0;top:0;bottom:0;z-index:70;width:min(340px,90vw)}.side.hidden{margin-right:-92vw}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><div class="gem"></div>
      <div><div class="word">AMBER</div><div class="sub">notepad</div></div></div>
    <div class="grow"></div>
    <div class="toolbar">
      <div class="seg" id="modeseg">
        <button data-mode="notebook" class="on">▤ Notebook</button>
        <button data-mode="scratch">▦ Scratch</button>
      </div>
      <button class="btn pri" id="runall">▶ Run all</button>
      <button class="btn" id="clearout">Clear</button>
      <button class="btn" id="resetenv">Reset env</button>
      <button class="btn" id="aitoggle" title="AI ghost autocomplete — Tab to accept">⌁ AI on</button>
      <button class="btn" id="surprise">🎲 Surprise</button>
      <button class="btn" id="download">↓ .k</button>
      <div class="themewrap">
        <button class="btn themebtn" id="themebtn"><span class="swatch" id="themeSw"></span><span id="themeName">Amber</span> ▾</button>
        <div class="thememenu" id="thememenu"></div>
      </div>
      <button class="btn" id="exbtn">✦ Examples</button>
    </div>
  </header>

  <div class="split">
    <div class="work" id="work"></div>
    <div class="sidesplit" id="sidesplit"></div>
    <aside class="side" id="side" style="width:340px">
      <h3>Example library <span class="grow"></span><span id="excount" style="color:var(--faint);font-size:10px"></span></h3>
      <div class="searchwrap"><input class="search" id="exsearch" placeholder="search examples…  (try: join, vwap, date, json)"></div>
      <div class="exlist" id="exlist"></div>
    </aside>
  </div>

  <div class="status">
    <span class="dot"></span><span id="stMsg">ready</span>
    <span>mode <b id="stMode">notebook</b></span>
    <span>theme <b id="stTheme">Amber</b></span>
    <span>vars <b id="stVars">·</b></span>
    <span class="grow" style="flex:1"></span>
    <span><span class="kbd">Shift</span>+<span class="kbd">↵</span> run · next</span>
    <span><span class="kbd">Ctrl</span>+<span class="kbd">↵</span> run</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================================
// Amber interpreter — a browser/Node evaluator for a working subset of Amber
// (the q/kdb+-style array language).  Right-to-left evaluation, ints/floats/
// chars/symbols/lists/dicts/tables, verbs, adverbs, lambdas, indexing,
// assignment, column attributes, and a slice of the Amber vocabulary.
// ============================================================================
(function (root) {
  'use strict';

  // ---- value model -------------------------------------------------------
  // atoms:   {t:'i'|'f'|'c'|'s', v}
  // vectors: {t:'I'|'F'|'C'|'S'|'A', v:[...], at?}    C -> v is a JS string
  // dict:    {t:'m', k:<vec>, v:<vec/list>}
  // table:   {t:'T', c:[names], d:[colvals], at:[attr]}
  // keyed:   {t:'K', kt:<table>, vt:<table>}
  // lambda:  {t:'fn', p:[names], b:<terms>, src, rank}
  // verb:    {t:'vb', n, mon, dy}
  // proj:    {t:'pr', f, args, need}
  // unit/::  {t:'u'}
  const U = { t: 'u' };
  const I = (v) => ({ t: 'i', v: v | 0 });
  const F = (v) => ({ t: 'f', v: +v });
  const Ch = (v) => ({ t: 'c', v: v });
  const Sy = (v) => ({ t: 's', v: v });

  function isAtom(x) { return x && 'ifcsu'.indexOf(x.t) >= 0; }
  function isVec(x) { return x && 'IFCSA'.indexOf(x.t) >= 0; }
  function isNum(x) { return x && (x.t === 'i' || x.t === 'f'); }
  function isNumVec(x) { return x && (x.t === 'I' || x.t === 'F'); }

  function len(x) {
    if (isVec(x)) return x.t === 'C' ? x.v.length : x.v.length;
    if (x.t === 'm') return len(x.k);
    if (x.t === 'T') return x.d.length ? len(x.d[0]) : 0;
    if (x.t === 'K') return len(x.kt);
    return 1;
  }

  // JS array of element *values* from a vector
  function arr(x) {
    if (x.t === 'C') return x.v.split('').map(Ch);
    if (x.t === 'S') return x.v.map(Sy);
    if (x.t === 'I') return x.v.map(I);
    if (x.t === 'F') return x.v.map(F);
    if (x.t === 'A') return x.v.slice();
    if (isAtom(x)) return [x];
    return [x];
  }
  // raw JS primitives
  function raw(x) {
    if (x.t === 'C') return x.v.split('');
    if (x.t === 'S' || x.t === 'I' || x.t === 'F' || x.t === 'A') return x.v.slice();
    return [x.v];
  }

  // build a best-typed vector from an array of *values*
  function vec(vals) {
    if (vals.length === 0) return { t: 'A', v: [] };
    let allc = true, alls = true, alli = true, allf = true;
    for (const e of vals) {
      if (!e || e.t === undefined) { allc = alls = alli = allf = false; break; }
      if (e.t !== 'c') allc = false;
      if (e.t !== 's') alls = false;
      if (e.t !== 'i') alli = false;
      if (e.t !== 'i' && e.t !== 'f') allf = false;
    }
    if (allc) return { t: 'C', v: vals.map(e => e.v).join('') };
    if (alls) return { t: 'S', v: vals.map(e => e.v) };
    if (alli) return { t: 'I', v: vals.map(e => e.v) };
    if (allf) return { t: 'F', v: vals.map(e => +e.v) };
    return { t: 'A', v: vals.slice() };
  }
  // build numeric vector, choosing int vs float
  function nvec(nums) {
    let allint = true;
    for (const n of nums) if (!Number.isInteger(n)) { allint = false; break; }
    return allint ? { t: 'I', v: nums.map(n => n | 0) } : { t: 'F', v: nums.map(n => +n) };
  }

  function num(x) {
    if (x.t === 'i' || x.t === 'f') return x.v;
    if (x.t === 'c') return x.v.charCodeAt(0);
    throw err('type');
  }
  function err(m) { const e = new Error(m); e.amber = true; return e; }
  function isNull(x) {
    if (x.t === 'i') return x.v === -9223372036854775807 || x.v === null;
    if (x.t === 'f') return Number.isNaN(x.v);
    if (x.t === 'c') return x.v === ' ';
    if (x.t === 's') return x.v === '';
    return false;
  }
  const NF = { t: 'f', v: NaN };            // 0n
  const NI = { t: 'i', v: -9223372036854775807 }; // 0N

  // ---- lexer -------------------------------------------------------------
  const VERBCH = "+-*%!&|<>=~,^#_$?@.";
  function lex(s) {
    const T = [];
    let i = 0, n = s.length;
    const prevNoun = () => {
      // look at last meaningful token
      for (let j = T.length - 1; j >= 0; j--) {
        const t = T[j];
        return t.k === 'num' || t.k === 'name' || t.k === 'str' || t.k === 'sym' ||
          t.k === 'symv' || t.v === ')' || t.v === ']' || t.v === '}';
      }
      return false;
    };
    while (i < n) {
      let c = s[i];
      if (c === ' ' || c === '\t' || c === '\r') { i++; continue; }
      if (c === '\n' || c === ';') { T.push({ k: 'sep', v: c === '\n' ? ';' : ';' }); i++; continue; }
      if (c === '/' && (i === 0 || s[i - 1] === '\n' || s[i - 1] === ' ' || s[i - 1] === '\t')) {
        // line comment to EOL
        while (i < n && s[i] !== '\n') i++;
        continue;
      }
      if (c === '"') { // string
        let j = i + 1, out = '';
        while (j < n && s[j] !== '"') {

  /* ===================== SYNTAX HIGHLIGHT ===================== */
  function esc(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
  function highlight(src) {
    let i = 0, n = src.length, out = '';
    const push = (cls, txt) => { out += cls ? `<span class="hl-${cls}">${esc(txt)}</span>` : esc(txt); };
    while (i < n) {
      const c = src[i];
      if (c === '/' && (i === 0 || src[i - 1] === '\n' || src[i - 1] === ' ' || src[i - 1] === '\t')) { let j = i; while (j < n && src[j] !== '\n') j++; push('com', src.slice(i, j)); i = j; continue; }
      if (c === '"') { let j = i + 1; while (j < n && src[j] !== '"') { if (src[j] === '\\') j++; j++; } j++; push('str', src.slice(i, Math.min(j, n))); i = Math.min(j, n); continue; }

      if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(src[i + 1] || '')) || (c === '-' && /[0-9]/.test(src[i + 1] || '') && !/[A-Za-z0-9.)\]]/.test((src[i - 1] || ' ')))) {
        let j = i; if (src[j] === '-') j++; while (j < n && /[0-9.eE]/.test(src[j])) j++;
        while (src[j] === ' ' && (/[0-9]/.test(src[j + 1] || '') || (src[j + 1] === '-' && /[0-9.]/.test(src[j + 2] || '')))) { j++; if (src[j] === '-') j++; while (j < n && /[0-9.eE]/.test(src[j])) j++; }
        push('num', src.slice(i, j)); i = j; continue;
      }
      if (/[A-Za-z]/.test(c)) { let j = i; while (j < n && /[A-Za-z0-9.]/.test(src[j])) j++; const nm = src.slice(i, j); push(BUILTINS.has(nm) ? 'kw' : 'var', nm); i = j; continue; }
      if (c === "'" && src[i + 1] === ':') { push('adv', "':"); i += 2; continue; }
      if ((c === '/' || c === '\\') && src[i + 1] === ':') { push('adv', c + ':'); i += 2; continue; }
      if (c === "'" || c === '/' || c === '\\') { push('adv', c); i++; continue; }
      if (c === ':' && src[i + 1] === ':') { push('verb', '::'); i += 2; continue; }
      if (VERBCH.indexOf(c) >= 0) { push('verb', c); i++; continue; }
      if ('()[]{}'.indexOf(c) >= 0) { push('brk', c); i++; continue; }
      if (c === ';') { push('brk', ';'); i++; continue; }
      push(null, c); i++;
    }

  }

  /* ===================== AI GHOST AUTOCOMPLETE ===================== */
  // A local predictive engine (no network): a token n-gram model trained on the
  // example corpus + your own run history, plus symbol-table prefix completion.
  const AC = (function () {
    let enabled = true, suppress = false;
    const g2 = {}, g3 = {}, uni = {};
    const KW = ['select', 'by', 'from', 'where', 'update', 'exec', 'delete', 'insert'];
    function tok(s) {
      const out = []; let i = 0, n = s.length;
      while (i < n) {
        const c = s[i];
        if (c === ' ' || c === '\t') { i++; continue; }
        if (c === '/') break;                                    // comment: ignore rest
        if (c === '"') { let j = i + 1; while (j < n && s[j] !== '"') { if (s[j] === '\\') j++; j++; } out.push('␝S'); i = j + 1; continue; }
        if (c === '`') { let j = i; while (j < n && (s[j] === '`' || /[A-Za-z0-9.]/.test(s[j]))) j++; out.push(s.slice(i, j)); i = j; continue; }
        if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(s[i + 1] || ''))) { let j = i; while (j < n && /[0-9.eE]/.test(s[j])) j++; while (s[j] === ' ' && /[0-9]/.test(s[j + 1] || '')) { j++; while (j < n && /[0-9.]/.test(s[j])) j++; } out.push('␝N'); i = j; continue; }

        out.push(c); i++;

    function best(obj) { let b = null, bc = 0; for (const k in obj) if (obj[k] > bc) { bc = obj[k]; b = k; } return b; }
    function symbolNames() {
      const vars = Object.keys(A._root.vars);
      return { vars: new Set(vars), all: Array.from(new Set(vars.concat(Array.from(BUILTINS)).concat(KW))) };
    }
    function predictTok(t) {
      const n = t.length; if (n >= 2) { const c = g3[t[n - 2] + '' + t[n - 1]]; const b = c && best(c); if (b) return b; }
      if (n >= 1) { const c = g2[t[n - 1]]; const b = c && best(c); if (b) return b; }

        const pre = m[0]; const S = symbolNames();
        let bestN = null, bestScore = -1;
        for (const nm of S.all) {
          if (nm.length <= pre.length || nm.slice(0, pre.length) !== pre) continue;
          const sc = (S.vars.has(nm) ? 1000 : 0) + (uni[nm] || 0) * 3 + (BUILTINS.has(nm) ? 6 : 0) - nm.length * 0.2;
          if (sc > bestScore) { bestScore = sc; bestN = nm; }
        }
        if (bestN) { let g = bestN.slice(pre.length); if (BUILTINS.has(bestN) && /^(aj|lj|ij|uj|pj|qby|qwhere|qselect|xasc|xkey|in|mod|div|round|xbar|wavg|wsum|hms|tstamp|ymd2d|mavg|msum|mmax|mmin|mdev|bars|cast|dset|splay)$/.test(bestN)) g += '['; return g; }

  })();
  // seed corpus: idiomatic Amber lines so predictions are useful from the first keystroke
  const CORPUS = [
    'sum til 100', 'avg x', 'asc x', 'meta t', 'cols t', 'show t', 'gentq 5000', 'reverse x',
    'qby[trades;`sym;(,`vwap)!,{wavg[x`sz;x`px]}]', 'aj[`sym`time;trades;quotes]', 'bars[1;trades]',
    'sel"select vwap:wavg[sz;px] by sym from trades where px>100"', 'sel"select px from trades"',
    'mavg[20;px]', 'msum[10;x]', 'mmax[5;x]', 'ema[0.3;x]', 'dstr ymd2d[2024;1;15]', 'dow d',

  /* ===================== VALUE RENDER ===================== */
  function cell(txt, cls) { const td = document.createElement('td'); if (cls) td.className = cls; td.textContent = txt; return td; }
  function attrBadge(a) { return a ? `<span class="att">${a}</span>` : ''; }
  function renderDescribe(d) {
    if (!d || d.kind === 'unit') return null;
    if (d.kind === 'text') { const pre = document.createElement('pre'); pre.className = 'ret'; pre.textContent = d.text; return pre; }
    if (d.kind === 'dict') {
      const t = document.createElement('table'); t.className = 'grid dictgrid';
      for (let i = 0; i < d.keys.length; i++) { const tr = document.createElement('tr'); tr.appendChild(cell(d.keys[i], 'k')); tr.appendChild(cell(d.vals[i], d.valign ? 'r' : '')); t.appendChild(tr); }
      return t;
    }
    if (d.kind === 'table' || d.kind === 'keyed') return renderTableLike(d);
    return null;
  }
  function renderTableLike(d) {
    const t = document.createElement('table'); t.className = 'grid';
    const thead = document.createElement('tr');
    const kc = d.kind === 'keyed' ? d.kcols : [], ka = d.kind === 'keyed' ? d.kattrs : [], kal = d.kind === 'keyed' ? d.kalign : [];
    const vc = d.kind === 'keyed' ? d.vcols : d.cols, va = d.kind === 'keyed' ? d.vattrs : d.attrs, val = d.kind === 'keyed' ? d.valign : d.align;
    kc.forEach((c, i) => { const th = document.createElement('th'); th.className = (kal[i] ? 'r ' : '') + 'keyw'; th.innerHTML = esc(c) + attrBadge(ka[i]); thead.appendChild(th); });
    vc.forEach((c, i) => { const th = document.createElement('th'); if (val[i]) th.className = 'r'; th.innerHTML = esc(c) + attrBadge(va[i]); thead.appendChild(th); });
    t.appendChild(thead);
    const krows = d.kind === 'keyed' ? d.krows : null, vrows = d.kind === 'keyed' ? d.vrows : d.rows;
    const nrows = vrows.length, cap = 300;
    for (let r = 0; r < Math.min(nrows, cap); r++) {
      const tr = document.createElement('tr');
      if (krows) krows[r].forEach((v, i) => tr.appendChild(cell(v, (kal[i] ? 'r ' : '') + 'keyw')));
      vrows[r].forEach((v, i) => tr.appendChild(cell(v, val[i] ? 'r' : '')));
      t.appendChild(tr);
    }
    const wrap = document.createElement('div'); wrap.appendChild(t);
    const m = document.createElement('div'); m.className = 'typ';
    m.textContent = `${nrows} row${nrows === 1 ? '' : 's'}` + (d.kind === 'keyed' ? ` · keyed ${d.kcols.length}!${d.vcols.length}` : ` · ${d.cols.length} cols`);
    wrap.appendChild(m);
    if (nrows > cap) { const mm = document.createElement('div'); mm.className = 'typ'; mm.textContent = `… ${nrows - cap} more rows`; wrap.appendChild(mm); }
    return wrap;
  }
  function renderInto(container, res) {
    container.innerHTML = ''; let any = false;
    if (res.out && res.out.length) { const pre = document.createElement('pre'); pre.className = 'console'; pre.textContent = res.out.join('\n'); container.appendChild(pre); any = true; }
    if (res.error) { const e = document.createElement('div'); e.className = 'err'; e.textContent = "'" + res.error; container.appendChild(e); any = true; }
    else if (res.value && res.value.t !== 'u') { const node = renderDescribe(A.describe(res.value)); if (node) { container.appendChild(node); any = true; } }
    if (container.classList) container.classList.toggle('empty', !any);
    return any;

  /* ===================== NOTEBOOK ===================== */
  let cells = [], uid = 0;
  function makeCell(src) {
    const id = ++uid;
    const el = document.createElement('div'); el.className = 'cell'; el.dataset.id = id;
    el.innerHTML = `<div class="chead"><div class="run" title="run (Ctrl+Enter)">▶</div><span class="idx"></span><div class="cgrow"></div>
      <button class="mini up" title="move up">↑</button><button class="mini down" title="move down">↓</button>
      <button class="mini cp" title="copy">⧉</button><button class="mini add" title="add below">＋</button><button class="mini del" title="delete">✕</button></div>
      <div class="editor"><pre class="hl"></pre><textarea spellcheck="false" autocapitalize="off" autocomplete="off" wrap="soft"></textarea></div>
      <div class="out empty"></div>`;
    const ta = el.querySelector('textarea'), hl = el.querySelector('.hl'), out = el.querySelector('.out');
    const badge = document.createElement('div'); badge.className = 'acbadge'; badge.textContent = '⌁ Tab'; el.querySelector('.editor').appendChild(badge);
    const obj = { id, el, ta, hl, out, ghost: null };
    ta.value = src || '';
    function sync() { attachGhost(ta, hl, badge, obj); ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
    ta.addEventListener('input', () => { AC.allow(); sync(); });
    ta.addEventListener('click', sync);
    ta.addEventListener('keyup', e => { if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].indexOf(e.key) >= 0) sync(); });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Tab' && obj.ghost) { e.preventDefault(); acceptGhost(ta, obj); sync(); return; }
      if (e.key === 'Escape' && obj.ghost) { AC.dismiss(); obj.ghost = null; sync(); return; }
      if (e.key === 'Enter' && (e.shiftKey || e.metaKey || e.ctrlKey)) {
        e.preventDefault(); runCell(obj);
        if (e.shiftKey && !(e.metaKey || e.ctrlKey)) { const i = cells.indexOf(obj); if (i === cells.length - 1) { const c = addCell('', i); c.ta.focus(); } else cells[i + 1].ta.focus(); }
      }
    });
    el.querySelector('.run').onclick = () => runCell(obj);
    el.querySelector('.add').onclick = () => { const c = addCell('', cells.indexOf(obj)); c.ta.focus(); };
    el.querySelector('.del').onclick = () => removeCell(obj);
    el.querySelector('.up').onclick = () => moveCell(obj, -1);
    el.querySelector('.down').onclick = () => moveCell(obj, 1);
    el.querySelector('.cp').onclick = () => copyText(ta.value, 'input copied');
    obj.sync = sync; setTimeout(sync, 0);

  // ---- ghost helpers (shared by notebook cells and scratch editor) ----
  function attachGhost(ta, hl, badge, obj) {
    let html = highlight(ta.value); const g = AC.ghostFor(ta); obj.ghost = g || null;

    hl.innerHTML = html; if (badge) badge.classList.toggle('show', !!g);
  }
  function acceptGhost(ta, obj) { const p = ta.selectionStart; ta.value = ta.value.slice(0, p) + obj.ghost + ta.value.slice(p); const np = p + obj.ghost.length; ta.selectionStart = ta.selectionEnd = np; obj.ghost = null; }
  // ---- copy helpers ----
  function copyText(t, msg) { try { navigator.clipboard.writeText(t); } catch (e) { const x = document.createElement('textarea'); x.value = t; document.body.appendChild(x); x.select(); try { document.execCommand('copy'); } catch (_) { } x.remove(); } toast(msg || 'copied'); }
  function gridText(cols, rows) { const w = cols.map((c, i) => Math.max(c.length, ...rows.map(r => (r[i] || '').length), 1)); const pad = (s, i) => ((s || '') + ' '.repeat(w[i])).slice(0, w[i]); const head = cols.map(pad).join(' '); const sep = w.map(x => '-'.repeat(x)).join(' '); return [head, sep].concat(rows.map(r => r.map(pad).join(' '))).join('\n'); }
  function describeText(d) { if (!d || d.kind === 'unit') return ''; if (d.kind === 'text') return d.text; if (d.kind === 'dict') return d.keys.map((k, i) => k + ' | ' + d.vals[i]).join('\n'); if (d.kind === 'table') return gridText(d.cols, d.rows); if (d.kind === 'keyed') return gridText(d.kcols.concat(d.vcols), d.krows.map((kr, i) => kr.concat(d.vrows[i]))); return ''; }
  function outText(res) { let s = ''; if (res.out && res.out.length) s += res.out.join('\n'); if (res.error) s += (s ? '\n' : '') + "'" + res.error; else if (res.value && res.value.t !== 'u') { const d = A.describe(res.value); const t = describeText(d); if (t) s += (s ? '\n' : '') + t; } return s; }
  function addCopyBar(container, src, res) {
    if (container.classList.contains('empty')) return;
    const bar = document.createElement('div'); bar.className = 'outbar';
    const mk = (label, txt, msg) => { const b = document.createElement('button'); b.className = 'cpbtn'; b.textContent = label; b.onclick = () => copyText(txt, msg); return b; };
    bar.appendChild(mk('⧉ in', src, 'input copied'));
    bar.appendChild(mk('⧉ out', outText(res), 'output copied'));
    bar.appendChild(mk('⧉ both', src + '\n' + outText(res), 'copied in+out'));
    container.insertBefore(bar, container.firstChild);
  }
  function cellsHost() { let h = $('cellsHost'); return h; }
  function addCell(src, afterIdx) {
    const obj = makeCell(src); const host = $('cellsHost');
    if (afterIdx === undefined || afterIdx >= cells.length - 1) { cells.push(obj); host.appendChild(obj.el); }
    else { cells.splice(afterIdx + 1, 0, obj); host.insertBefore(obj.el, cells[afterIdx + 2] ? cells[afterIdx + 2].el : null); }
    reindex(); return obj;
  }
  function removeCell(obj) { const i = cells.indexOf(obj); if (i < 0) return; cells.splice(i, 1); obj.el.remove(); if (!cells.length) addCell(''); reindex(); }
  function moveCell(obj, d) { const i = cells.indexOf(obj), j = i + d; if (j < 0 || j >= cells.length) return; cells.splice(i, 1); cells.splice(j, 0, obj); const host = $('cellsHost'); host.innerHTML = ''; cells.forEach(c => host.appendChild(c.el)); reindex(); obj.ta.focus(); }
  function reindex() { cells.forEach((c, i) => c.el.querySelector('.idx').textContent = '[' + (i + 1) + ']'); }
  function runCell(obj) { const src = obj.ta.value; const res = A.run(src); renderInto(obj.out, res); addCopyBar(obj.out, src, res); AC.train(src); updateVars(); }

  /* ===================== SCRATCH ===================== */
  let scratchTA = null;
  function runScratch() {
    const src = scratchTA.value; const con = $('scratchConsole'); con.innerHTML = '';
    const lines = src.split('\n'); let txt = '';
    lines.forEach(line => {
      const t = line.trim();
      if (!t || t[0] === '/') return;
      const res = A.run(line); AC.train(line);
      const row = document.createElement('div'); row.className = 'trow';
      const inp = document.createElement('div'); inp.className = 'tin'; inp.innerHTML = '<span class="prompt">amber&gt; </span>' + esc(t);
      const outc = document.createElement('div'); outc.className = 'tout';
      renderInto(outc, res);
      row.appendChild(inp); row.appendChild(outc); con.appendChild(row);
      txt += 'amber> ' + t + '\n' + outText(res) + '\n';
    });
    con.dataset.txt = txt; con.scrollTop = con.scrollHeight; updateVars();
  }

  /* ===================== MODE SWITCH ===================== */
  let mode = 'notebook';
  function setMode(m) {
    mode = m; $('stMode').textContent = m; save('mode', m);
    document.querySelectorAll('#modeseg button').forEach(b => b.classList.toggle('on', b.dataset.mode === m));
    const work = $('work'); work.innerHTML = '';
    if (m === 'notebook') {
      window.__scSync = null;
      const wrap = document.createElement('div'); wrap.className = 'cells'; wrap.id = 'cellsHost'; work.appendChild(wrap);
      const add = document.createElement('div'); add.className = 'addcell'; add.innerHTML = '<button>＋ add cell</button>'; add.querySelector('button').onclick = () => { const c = addCell(''); c.ta.focus(); }; work.appendChild(add);
      cells = []; addCell('');
    } else {
      const edH = load('edH') || '52%';
      work.innerHTML = `<div class="scratch" id="scratchRoot">
        <div class="pane ed" id="scratchEd" style="height:${edH}">
          <div class="phead">editor <span class="cgrow" style="flex:1"></span>
            <button class="cpbtn" id="scEdCopy">⧉ copy</button>
            <span style="font-family:var(--mono);margin-left:8px">Ctrl/⌘+Enter to run · Tab accepts ⌁</span></div>
          <div class="editor"><pre class="hl" id="scratchHL"></pre><textarea id="scratchTA" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="type Amber, one statement per line…"></textarea><div class="acbadge" id="scBadge">⌁ Tab</div></div></div>
        <div class="splitter" id="scSplit"></div>
        <div class="pane" style="flex:1;min-height:0">
          <div class="phead">console <span class="cgrow" style="flex:1"></span>
            <button class="cpbtn" id="scOutCopy">⧉ copy all</button></div>
          <div class="console-pane" id="scratchConsole"></div></div></div>`;
      scratchTA = $('scratchTA'); const hl = $('scratchHL'); const badge = $('scBadge');
      const sobj = { ghost: null };
      function sync() { attachGhost(scratchTA, hl, badge, sobj); }
      scratchTA.addEventListener('input', () => { AC.allow(); sync(); });
      scratchTA.addEventListener('click', sync);
      scratchTA.addEventListener('keyup', e => { if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].indexOf(e.key) >= 0) sync(); });
      scratchTA.addEventListener('keydown', e => {
        if (e.key === 'Tab' && sobj.ghost) { e.preventDefault(); acceptGhost(scratchTA, sobj); sync(); return; }
        if (e.key === 'Escape' && sobj.ghost) { AC.dismiss(); sobj.ghost = null; sync(); return; }
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); runScratch(); }
      });
      $('scEdCopy').onclick = () => copyText(scratchTA.value, 'editor copied');
      $('scOutCopy').onclick = () => copyText($('scratchConsole').dataset.txt || '', 'console copied');
      makeVSplitter($('scSplit'), $('scratchEd'), $('scratchRoot'), h => save('edH', h));
      window.__scSync = sync;
      sync();
    }
    updateVars();
  }
  // drag a horizontal splitter to resize the pane above it
  function makeVSplitter(split, topPane, root, onDone) {
    split.addEventListener('mousedown', e => {
      e.preventDefault(); split.classList.add('drag'); const r = root.getBoundingClientRect();
      const move = ev => { let h = (ev.clientY - r.top) / r.height * 100; h = Math.max(15, Math.min(85, h)); topPane.style.height = h + '%'; };
      const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); split.classList.remove('drag'); onDone && onDone(topPane.style.height); };
      document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
    });
  }

  /* ===================== EXAMPLES ===================== */
  const EXAMPLES = [

    // System / JSON
    ['System', 'Value → JSON', 'j.j ([]sym:`a`b; px:1.5 2.5)'],

    ['Tick', 'Define a stream', 'u.def[`trade; ([]sym:0#`; px:0#0.0)]\n`ok'],

    ['Tick', 'Accumulated table', 'u.def[`t;([]s:0#`;p:0#0.0)]\nu.pub[`t;([]s:`a`b;p:1 2.0)]\nu.pub[`t;([]s:`c;p:3.0)]\nu.get`t'],

    ['Showcase', 'FizzBuzz', '{$[0=15!x;`FizzBuzz;0=3!x;`Fizz;0=5!x;`Buzz;x]}\' 1+til 20'],

    ['Showcase', 'Primes < 40', 'p:2+til 38\np where {2=#&0=(1+til x)!\\:x}\'p'],

    ['Showcase', 'Powers of two', '10 {2*x}\\1'],

  function buildExamples(filter) {
    const host = $('exlist'); host.innerHTML = ''; const f = (filter || '').toLowerCase();
    const seen = {}; let count = 0;
    const cats = [];
    EXAMPLES.forEach(e => { if (cats.indexOf(e[0]) < 0) cats.push(e[0]); });
    cats.forEach(cat => {
      const items = EXAMPLES.filter(e => e[0] === cat && (!f || (e[1] + ' ' + e[2] + ' ' + e[0]).toLowerCase().includes(f)));
      if (!items.length) return;
      const h = document.createElement('div'); h.className = 'excat'; h.textContent = cat; host.appendChild(h);
      items.forEach(e => {
        count++;
        const b = document.createElement('button'); b.className = 'ex';
        b.innerHTML = `<div class="exl">${esc(e[1])}</div><div class="exc">${esc(e[2].split('\n')[0])}</div>`;
        b.onclick = () => runExample(e[2]);
        host.appendChild(b);
      });
    });
    $('excount').textContent = count + ' shown';
  }
  function runExample(code) {
    if (mode === 'notebook') {
      let c;
      if (cells.length === 1 && !cells[0].ta.value.trim()) c = cells[0]; else c = addCell('');
      c.ta.value = code; c.sync(); runCell(c); c.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      scratchTA.value = (scratchTA.value ? scratchTA.value.replace(/\n+$/, '') + '\n' : '') + code;
      $('scratchHL').innerHTML = highlight(scratchTA.value); runScratch();
    }
    toast('inserted & ran');
  }

  /* ===================== TOOLBAR ===================== */
  function updateVars() { const names = Object.keys(A._root.vars); $('stVars').textContent = names.length ? names.slice(0, 12).join(' ') + (names.length > 12 ? ' …' : '') : '·'; }
  function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 1300); }
  $('runall').onclick = () => { if (mode === 'notebook') cells.forEach(runCell); else runScratch(); };
  $('clearout').onclick = () => { if (mode === 'notebook') cells.forEach(c => { c.out.innerHTML = ''; c.out.classList.add('empty'); }); else $('scratchConsole').innerHTML = ''; };
  $('resetenv').onclick = () => { A.reset(); updateVars(); toast('environment reset'); };
  $('download').onclick = () => {
    const src = mode === 'notebook' ? cells.map(c => c.ta.value).filter(x => x.trim()).join('\n\n') : scratchTA.value;
    const blob = new Blob([src || ''], { type: 'text/plain' }); const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'amber-notepad.k'; a.click(); toast('downloaded .k');
  };
  $('surprise').onclick = () => { const e = EXAMPLES[Math.floor(Math.random() * EXAMPLES.length)]; runExample(e[2]); };
  $('themebtn').onclick = e => { e.stopPropagation(); $('thememenu').classList.toggle('open'); };
  document.addEventListener('click', () => $('thememenu').classList.remove('open'));
  $('thememenu').onclick = e => e.stopPropagation();
  $('exbtn').onclick = () => $('side').classList.toggle('hidden');
  $('exsearch').addEventListener('input', e => buildExamples(e.target.value));
  document.querySelectorAll('#modeseg button').forEach(b => b.onclick = () => setMode(b.dataset.mode));
  // AI ghost autocomplete toggle
  function refreshAI() { const on = AC.isOn(); $('aitoggle').textContent = '⌁ AI ' + (on ? 'on' : 'off'); $('aitoggle').classList.toggle('pri', on); save('ai', on ? '1' : '0'); }
  $('aitoggle').onclick = () => { AC.toggle(); refreshAI(); (mode === 'notebook' ? cells.forEach(c => c.sync()) : (window.__scSync && window.__scSync())); };
  // draggable sidebar width
  (function () {
    const sp = $('sidesplit'), side = $('side');
    sp.addEventListener('mousedown', e => {
      e.preventDefault(); sp.classList.add('drag');
      const move = ev => { let w = window.innerWidth - ev.clientX; w = Math.max(220, Math.min(620, w)); side.style.width = w + 'px'; save('sideW', w); };
      const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); sp.classList.remove('drag'); };
      document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
    });
    const sw = load('sideW'); if (sw) side.style.width = sw + 'px';
  })();

  /* ===================== BOOT ===================== */
  EXAMPLES.forEach(e => AC.train(e[2]));
  buildThemeMenu();
  applyTheme(load('theme') && THEMES[load('theme')] ? load('theme') : 'amber');
  buildExamples('');
  if (load('ai') === '0') AC.setOn(false);
  refreshAI();
  setMode(load('mode') === 'scratch' ? 'scratch' : 'notebook');
  updateVars();
})();
