<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amber — interpreter notepad</title>
<style>
  :root{
    --bg:#0b0805; --bg2:#120c06; --panel:#160f07; --panel2:#1c130a;
    --line:#3a2a12; --line2:#2a1e0e;
    --amber:#ffb000; --amber-b:#ffcf6b; --amber-d:#c78a2a; --amber-f:#7c5c26;
    --ink:#f4d79a; --dim:#b78e46; --faint:#7a5c2e;
    --str:#ffd98a; --sym:#ff9440; --num:#ffe6a8; --verb:#ff9e3d; --adv:#ffbe5c;
    --brk:#a9791f; --kw:#ffd06b; --var:#e6c078; --com:#6f5427;
    --err:#ff6b4a; --ok:#8fd06b;
    --glow:0 0 8px rgba(255,176,0,.18);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 70% -10%, #1c1206 0%, rgba(28,18,6,0) 60%),
      radial-gradient(900px 600px at -10% 110%, #170f06 0%, rgba(23,15,6,0) 55%),
      var(--bg);
    color:var(--ink); font-family:var(--mono); font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  /* faint scanlines + vignette for the phosphor feel */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(180deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.045) 2px 3px);
    mix-blend-mode:multiply;opacity:.6}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;
    box-shadow:inset 0 0 220px 40px rgba(0,0,0,.55)}
  a{color:var(--amber-b);text-decoration:none}

  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* header */
  header{display:flex;align-items:center;gap:18px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#160f07,#100b06);}
  .brand{display:flex;flex-direction:column;line-height:1}
  .word{font-weight:800;letter-spacing:.42em;font-size:20px;color:var(--amber);
    text-shadow:var(--glow); padding-left:.42em}
  .tag{font-size:10.5px;letter-spacing:.34em;color:var(--faint);margin-top:6px;padding-left:.34em;text-transform:uppercase}
  .diamond{width:26px;height:26px;flex:0 0 auto;transform:rotate(45deg);
    background:linear-gradient(135deg,#ffd873,#ffab00 55%,#a35e00);
    border:1px solid #7a4b06;border-radius:5px;
    box-shadow:0 0 14px rgba(255,176,0,.5), inset 0 0 8px rgba(255,255,255,.35)}
  .spacer{flex:1}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  button{font-family:var(--mono);font-size:12px;color:var(--amber-b);
    background:linear-gradient(180deg,#20160b,#180f07);border:1px solid var(--line);
    border-radius:7px;padding:7px 11px;cursor:pointer;transition:.12s;letter-spacing:.02em}
  button:hover{border-color:var(--amber-d);color:#fff0cf;box-shadow:var(--glow)}
  button:active{transform:translateY(1px)}
  button.pri{background:linear-gradient(180deg,#3a2708,#2a1c06);border-color:#6b4a12;color:#ffe1a6}
  button.ghost{background:transparent}
  .ver{font-size:11px;color:var(--faint);letter-spacing:.12em;padding:0 4px;align-self:center}

  /* body split */
  .split{display:flex;flex:1;min-height:0}
  .book{flex:1;min-width:0;overflow:auto;padding:20px 20px 120px}
  .book::-webkit-scrollbar,.side::-webkit-scrollbar{width:10px;height:10px}
  .book::-webkit-scrollbar-thumb,.side::-webkit-scrollbar-thumb{background:#3a2a12;border-radius:6px}
  .side{width:340px;flex:0 0 auto;border-left:1px solid var(--line);overflow:auto;
    background:linear-gradient(180deg,#130d06,#0e0904);padding:14px 14px 80px}
  .side.hidden{display:none}

  /* cells */
  .cells{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .cell{border:1px solid var(--line2);border-radius:10px;background:linear-gradient(180deg,#140e07,#0f0a05);
    overflow:hidden;transition:.15s}
  .cell:focus-within{border-color:var(--amber-d);box-shadow:0 0 0 1px rgba(255,176,0,.12), var(--glow)}
  .cellhead{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 10px;border-bottom:1px solid var(--line2);
    background:#120c06}
  .runbtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;
    cursor:pointer;color:var(--amber);border:1px solid var(--line);background:#1a1108;flex:0 0 auto}
  .runbtn:hover{color:#fff0cf;border-color:var(--amber-d);box-shadow:var(--glow)}
  .idx{font-size:11px;color:var(--faint);letter-spacing:.1em;min-width:34px}
  .chead-sp{flex:1}
  .cellhead .mini{width:24px;height:22px;font-size:12px;padding:0;display:flex;align-items:center;justify-content:center}
  .editor{position:relative}
  .editor pre,.editor textarea{
    margin:0;padding:12px 14px;font-family:var(--mono);font-size:13.5px;line-height:1.55;
    white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;border:0;tab-size:2}
  .editor pre{position:absolute;inset:0;pointer-events:none;color:var(--ink);z-index:1}
  .editor textarea{position:relative;z-index:2;width:100%;background:transparent;color:transparent;
    caret-color:var(--amber);resize:none;outline:none;display:block;min-height:22px;overflow:hidden}
  .editor textarea::selection{background:rgba(255,176,0,.22)}
  .hl-com{color:var(--com);font-style:italic}
  .hl-str{color:var(--str)}
  .hl-sym{color:var(--sym)}
  .hl-num{color:var(--num)}
  .hl-verb{color:var(--verb);font-weight:600}
  .hl-adv{color:var(--adv);font-weight:600}
  .hl-brk{color:var(--brk)}
  .hl-kw{color:var(--kw)}
  .hl-var{color:var(--var)}

  .out{border-top:1px solid var(--line2);padding:10px 14px;background:#0d0904;min-height:0}
  .out.empty{display:none}
  .out pre{margin:0;white-space:pre;overflow-x:auto;font-family:var(--mono);font-size:13px;color:var(--ink)}
  .out pre::-webkit-scrollbar{height:8px}
  .console{color:var(--dim)}
  .err{color:var(--err);white-space:pre-wrap}
  .ret{color:var(--amber-b)}
  .otag{font-size:9.5px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase;margin:0 0 4px}

  /* value grids */
  table.grid{border-collapse:collapse;font-size:13px;margin:2px 0}
  table.grid th{color:var(--amber);text-align:left;font-weight:600;padding:2px 12px 5px 2px;
    border-bottom:1px solid var(--line);white-space:nowrap}
  table.grid td{padding:2px 12px 2px 2px;color:var(--ink);white-space:nowrap;vertical-align:top}
  table.grid td.r,table.grid th.r{text-align:right}
  table.grid .att{font-size:9px;color:var(--sym);letter-spacing:.1em;margin-left:6px;vertical-align:super}
  table.grid tr:hover td{background:rgba(255,176,0,.05)}
  .keyw{border-right:2px solid var(--line);padding-right:8px !important}
  .dictgrid td.k{color:var(--sym)}
  .typ{font-size:10px;color:var(--faint)}

  /* sidebar */
  .side h2{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber-d);
    margin:18px 0 8px;border-bottom:1px solid var(--line2);padding-bottom:6px}
  .side h2:first-child{margin-top:2px}
  .snip{display:block;width:100%;text-align:left;margin:4px 0;padding:7px 9px;border-radius:7px;
    border:1px solid var(--line2);background:#120c06;color:var(--var);font-size:12.5px;cursor:pointer;
    white-space:pre-wrap;line-height:1.4}
  .snip:hover{border-color:var(--amber-d);color:#ffe1a6;box-shadow:var(--glow)}
  .snip .cm{color:var(--com)}
  .ref{font-size:12px;color:var(--dim);margin:3px 0}
  .ref b{color:var(--amber-b);font-weight:600}
  .note{font-size:11.5px;color:var(--faint);line-height:1.5;margin:6px 0}
  .side .sub{font-size:10px;color:var(--faint);letter-spacing:.16em;text-transform:uppercase;margin:10px 0 4px}

  /* status bar */
  .status{position:fixed;bottom:0;left:0;right:0;height:26px;display:flex;align-items:center;gap:16px;
    padding:0 16px;font-size:11px;color:var(--faint);letter-spacing:.06em;
    background:linear-gradient(180deg,#0e0904,#0b0704);border-top:1px solid var(--line2);z-index:50}
  .status b{color:var(--amber-d);font-weight:600}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .kbd{border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--dim);font-size:10.5px}
  @media(max-width:820px){ .side{position:fixed;right:0;top:0;bottom:0;z-index:60;width:min(340px,88vw);
     box-shadow:-20px 0 60px rgba(0,0,0,.6)} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="diamond"></div>
    <div class="brand"><div class="word">AMBER</div><div class="tag">interpreter · notepad</div></div>
    <span class="ver">v1.4</span>
    <div class="spacer"></div>
    <div class="toolbar">
      <button class="pri" id="runall">▶ run all</button>
      <button id="addcell">＋ cell</button>
      <button id="clearout" class="ghost">clear output</button>
      <button id="resetenv" class="ghost">reset env</button>
      <button id="loaddemo" class="ghost">demo</button>
      <button id="toghelp">✦ help</button>
    </div>
  </header>

  <div class="split">
    <div class="book"><div class="cells" id="cells"></div></div>
    <aside class="side" id="side"></aside>
  </div>

  <div class="status">
    <span class="dot"></span>
    <span>ready</span>
    <span>cells <b id="stCells">0</b></span>
    <span>vars <b id="stVars">·</b></span>
    <span class="spacer" style="flex:1"></span>
    <span><span class="kbd">Shift</span>+<span class="kbd">↵</span> run &amp; next</span>
    <span><span class="kbd">Ctrl</span>+<span class="kbd">↵</span> run</span>
  </div>
</div>

<!-- ==== Amber interpreter ==== -->
<script>
// ============================================================================
// Amber interpreter — a browser/Node evaluator for a working subset of Amber
// (the q/kdb+-style array language).  Right-to-left evaluation, ints/floats/
// chars/symbols/lists/dicts/tables, verbs, adverbs, lambdas, indexing,
// assignment, column attributes, and a slice of the Amber vocabulary.
// ============================================================================
(function (root) {
  'use strict';

  // ---- value model -------------------------------------------------------
  // atoms:   {t:'i'|'f'|'c'|'s', v}
  // vectors: {t:'I'|'F'|'C'|'S'|'A', v:[...], at?}    C -> v is a JS string
  // dict:    {t:'m', k:<vec>, v:<vec/list>}
  // table:   {t:'T', c:[names], d:[colvals], at:[attr]}
  // keyed:   {t:'K', kt:<table>, vt:<table>}
  // lambda:  {t:'fn', p:[names], b:<terms>, src, rank}
  // verb:    {t:'vb', n, mon, dy}
  // proj:    {t:'pr', f, args, need}
  // unit/::  {t:'u'}
  const U = { t: 'u' };
  const I = (v) => ({ t: 'i', v: v | 0 });
  const F = (v) => ({ t: 'f', v: +v });
  const Ch = (v) => ({ t: 'c', v: v });
  const Sy = (v) => ({ t: 's', v: v });

  function isAtom(x) { return x && 'ifcsu'.indexOf(x.t) >= 0; }
  function isVec(x) { return x && 'IFCSA'.indexOf(x.t) >= 0; }
  function isNum(x) { return x && (x.t === 'i' || x.t === 'f'); }
  function isNumVec(x) { return x && (x.t === 'I' || x.t === 'F'); }

  function len(x) {
    if (isVec(x)) return x.t === 'C' ? x.v.length : x.v.length;
    if (x.t === 'm') return len(x.k);
    if (x.t === 'T') return x.d.length ? len(x.d[0]) : 0;
    if (x.t === 'K') return len(x.kt);
    return 1;
  }

  // JS array of element *values* from a vector
  function arr(x) {
    if (x.t === 'C') return x.v.split('').map(Ch);
    if (x.t === 'S') return x.v.map(Sy);
    if (x.t === 'I') return x.v.map(I);
    if (x.t === 'F') return x.v.map(F);
    if (x.t === 'A') return x.v.slice();
    if (isAtom(x)) return [x];
    return [x];
  }
  // raw JS primitives
  function raw(x) {
    if (x.t === 'C') return x.v.split('');
    if (x.t === 'S' || x.t === 'I' || x.t === 'F' || x.t === 'A') return x.v.slice();
    return [x.v];
  }

  // build a best-typed vector from an array of *values*
  function vec(vals) {
    if (vals.length === 0) return { t: 'A', v: [] };
    let allc = true, alls = true, alli = true, allf = true;
    for (const e of vals) {
      if (!e || e.t === undefined) { allc = alls = alli = allf = false; break; }
      if (e.t !== 'c') allc = false;
      if (e.t !== 's') alls = false;
      if (e.t !== 'i') alli = false;
      if (e.t !== 'i' && e.t !== 'f') allf = false;
    }
    if (allc) return { t: 'C', v: vals.map(e => e.v).join('') };
    if (alls) return { t: 'S', v: vals.map(e => e.v) };
    if (alli) return { t: 'I', v: vals.map(e => e.v) };
    if (allf) return { t: 'F', v: vals.map(e => +e.v) };
    return { t: 'A', v: vals.slice() };
  }
  // build numeric vector, choosing int vs float
  function nvec(nums) {
    let allint = true;
    for (const n of nums) if (!Number.isInteger(n)) { allint = false; break; }
    return allint ? { t: 'I', v: nums.map(n => n | 0) } : { t: 'F', v: nums.map(n => +n) };
  }

  function num(x) {
    if (x.t === 'i' || x.t === 'f') return x.v;
    if (x.t === 'c') return x.v.charCodeAt(0);
    throw err('type');
  }
  function err(m) { const e = new Error(m); e.amber = true; return e; }
  function isNull(x) {
    if (x.t === 'i') return x.v === -9223372036854775807 || x.v === null;
    if (x.t === 'f') return Number.isNaN(x.v);
    if (x.t === 'c') return x.v === ' ';
    if (x.t === 's') return x.v === '';
    return false;
  }
  const NF = { t: 'f', v: NaN };            // 0n
  const NI = { t: 'i', v: -9223372036854775807 }; // 0N

  // ---- lexer -------------------------------------------------------------
  const VERBCH = "+-*%!&|<>=~,^#_$?@.";
  function lex(s) {
    const T = [];
    let i = 0, n = s.length;
    const prevNoun = () => {
      // look at last meaningful token
      for (let j = T.length - 1; j >= 0; j--) {
        const t = T[j];
        return t.k === 'num' || t.k === 'name' || t.k === 'str' || t.k === 'sym' ||
          t.k === 'symv' || t.v === ')' || t.v === ']' || t.v === '}';
      }
      return false;
    };
    while (i < n) {
      let c = s[i];
      if (c === ' ' || c === '\t' || c === '\r') { i++; continue; }
      if (c === '\n' || c === ';') { T.push({ k: 'sep', v: c === '\n' ? ';' : ';' }); i++; continue; }
      if (c === '/' && (i === 0 || s[i - 1] === '\n' || s[i - 1] === ' ' || s[i - 1] === '\t')) {
        // line comment to EOL
        while (i < n && s[i] !== '\n') i++;
        continue;
      }
      if (c === '"') { // string
        let j = i + 1, out = '';
        while (j < n && s[j] !== '"') {
          if (s[j] === '\\') {
            const e = s[j + 1];
            out += e === 'n' ? '\n' : e === 't' ? '\t' : e === 'r' ? '\r' :
              e === '0' ? '\0' : e === '\\' ? '\\' : e === '"' ? '"' : e;
            j += 2;
          } else { out += s[j]; j++; }
        }
        i = j + 1; T.push({ k: 'str', v: out }); continue;
      }
      if (c === '`') { // symbol or symbol vector
        const syms = [];
        while (s[i] === '`') {
          i++;
          let nm = '';
          if (s[i] === '"') { // quoted symbol
            i++;
            while (i < n && s[i] !== '"') { nm += s[i]; i++; }
            i++;
          } else {
            while (i < n && /[A-Za-z0-9.]/.test(s[i])) { nm += s[i]; i++; }
          }
          syms.push(nm);
          // allow immediate backtick chain w/o space
        }
        if (syms.length === 1) T.push({ k: 'sym', v: syms[0] });
        else T.push({ k: 'symv', v: syms });
        continue;
      }
      // number / number-vector
      const startsNum = (ch, k) => /[0-9]/.test(ch) ||
        (ch === '.' && /[0-9]/.test(s[k + 1] || '')) ||
        (ch === '-' && (/[0-9]/.test(s[k + 1] || '') || (s[k + 1] === '.' && /[0-9]/.test(s[k + 2] || ''))) && !prevNoun());
      if (startsNum(c, i)) {
        const nums = [];
        while (true) {
          // read one number (with optional glued sign)
          let j = i, sign = 1;
          if (s[j] === '-') { sign = -1; j++; }
          let numstr = '';
          if (s.substr(j, 2) === '0N') { nums.push(NaN); j += 2; i = j; }
          else if (s.substr(j, 2) === '0n') { nums.push(NaN); j += 2; i = j; }
          else if (s.substr(j, 2) === '0w') { nums.push(sign * Infinity); j += 2; i = j; }
          else {
            while (j < n && /[0-9.eE]/.test(s[j])) {
              if ((s[j] === 'e' || s[j] === 'E') && (s[j + 1] === '-' || s[j + 1] === '+')) { numstr += s[j] + s[j + 1]; j += 2; continue; }
              numstr += s[j]; j++;
            }
            nums.push(sign * parseFloat(numstr));
            i = j;
          }
          // continue vector? space then another number glued with sign or digit
          let k = i;
          if (s[k] === ' ') {
            let m = k; while (s[m] === ' ') m++;
            if (/[0-9]/.test(s[m] || '') || (s[m] === '-' && /[0-9.]/.test(s[m + 1] || '')) ||
              (s[m] === '.' && /[0-9]/.test(s[m + 1] || '')) || s.substr(m, 2) === '0N' || s.substr(m, 2) === '0n' || s.substr(m, 2) === '0w') {
              i = m; continue;
            }
          }
          break;
        }
        T.push({ k: 'num', v: nums }); continue;
      }
      if (/[A-Za-z]/.test(c)) { // name
        let nm = '';
        while (i < n && /[A-Za-z0-9]/.test(s[i])) { nm += s[i]; i++; }
        // dotted names a.b
        while (s[i] === '.' && /[A-Za-z]/.test(s[i + 1] || '')) {
          nm += s[i]; i++;
          while (i < n && /[A-Za-z0-9]/.test(s[i])) { nm += s[i]; i++; }
        }
        T.push({ k: 'name', v: nm }); continue;
      }
      // adverbs
      if (c === "'" && s[i + 1] === ':') { T.push({ k: 'adv', v: "':" }); i += 2; continue; }
      if (c === '/' && s[i + 1] === ':') { T.push({ k: 'adv', v: '/:' }); i += 2; continue; }
      if (c === '\\' && s[i + 1] === ':') { T.push({ k: 'adv', v: '\\:' }); i += 2; continue; }
      if (c === "'") { T.push({ k: 'adv', v: "'" }); i++; continue; }
      if (c === '/') { T.push({ k: 'adv', v: '/' }); i++; continue; }
      if (c === '\\') { T.push({ k: 'adv', v: '\\' }); i++; continue; }
      // multi-char verbs 0: 1:
      if ((c === '0' || c === '1') && s[i + 1] === ':') { T.push({ k: 'verb', v: c + ':' }); i += 2; continue; }
      // assignment ::  and :
      if (c === ':' && s[i + 1] === ':') { T.push({ k: 'gassign', v: '::' }); i += 2; continue; }
      if (c === ':') { T.push({ k: 'assign', v: ':' }); i++; continue; }
      if (VERBCH.indexOf(c) >= 0) { T.push({ k: 'verb', v: c }); i++; continue; }
      if (c === '(') { T.push({ k: 'open', v: '(' }); i++; continue; }
      if (c === ')') { T.push({ k: 'close', v: ')' }); i++; continue; }
      if (c === '[') { T.push({ k: 'obrk', v: '[' }); i++; continue; }
      if (c === ']') { T.push({ k: 'cbrk', v: ']' }); i++; continue; }
      if (c === '{') { T.push({ k: 'obrc', v: '{' }); i++; continue; }
      if (c === '}') { T.push({ k: 'cbrc', v: '}' }); i++; continue; }
      throw err('lex:' + c);
    }
    return T;
  }

  // ---- parser: token stream -> list of statements, each a list of terms --
  // term kinds: {k:'val',v} {k:'name',n} {k:'verb',v} {k:'adv',a,of}
  //   {k:'paren',e} {k:'list',es} {k:'brack',args} {k:'lambda',...}
  //   {k:'assign',name,g} {k:'idxassign',...}
  function parse(tokens) {
    let p = 0;
    function peek() { return tokens[p]; }
    function next() { return tokens[p++]; }

    // parse a sequence of terms until a stopper (close/cbrk/cbrc/sep at depth)
    function parseTerms(stopset) {
      const terms = [];
      while (p < tokens.length) {
        const t = peek();
        if (stopset.indexOf(t.k) >= 0) break;
        if (t.k === 'sep') break;
        terms.push(parseTerm());
        // attach trailing adverbs
        while (p < tokens.length && peek().k === 'adv') {
          const a = next();
          const of = terms.pop();

  // fin.k analytics (operate on quote/trade tables via col access)
  defMon('mid', t => { const b = raw(tcol(t, 'bid')), a = raw(tcol(t, 'ask')); return nvecF(b.map((v, i) => (v + a[i]) / 2)); });

  defDy('taq', (tr, qu) => aj({ t: 'S', v: ['sym', 'time'] }, tr, qu, false));
  defDy('movavg', (w, x) => moving(num(w), raw(x), a => a.reduce((s, v) => s + v, 0) / a.length));
  defDy('movsum', (w, x) => moving(num(w), raw(x), a => a.reduce((s, v) => s + v, 0)));
  defDy('movmax', (w, x) => moving(num(w), raw(x), a => Math.max.apply(null, a)));

<script>
(function(){
  "use strict";
  const A = window.Amber;
  const cellsEl = document.getElementById('cells');
  const BUILTINS = new Set(Object.keys(A.BUILTINS).concat(
    ['til','sum','avg','max','min','prd','count','first','last','reverse','distinct','where','group','flip','meta','show','cols']));
  const VERBCH = "+-*%!&|<>=~,^#_$?@.:";

  let cells = []; let uid = 0;

  // ---------- syntax highlighting ----------
  function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function highlight(src){
    let i=0,n=src.length,out='';
    const push=(cls,txt)=>{out+= cls?`<span class="hl-${cls}">${esc(txt)}</span>`:esc(txt);};
    while(i<n){
      const c=src[i];
      // comment: / at line start or after whitespace, to EOL
      if(c==='/' && (i===0 || src[i-1]==='\n' || src[i-1]===' ' || src[i-1]==='\t')){
        let j=i; while(j<n && src[j]!=='\n') j++; push('com',src.slice(i,j)); i=j; continue;
      }
      if(c==='"'){ let j=i+1; while(j<n && src[j]!=='"'){ if(src[j]==='\\')j++; j++; } j++; push('str',src.slice(i,Math.min(j,n))); i=Math.min(j,n); continue; }
      if(c==='`'){ let j=i; while(j<n && (src[j]==='`' || /[A-Za-z0-9.]/.test(src[j]) || src[j]==='"')){ if(src[j]==='"'){ j++; while(j<n&&src[j]!=='"')j++; } j++; } push('sym',src.slice(i,j)); i=j; continue; }
      if(/[0-9]/.test(c) || (c==='.'&&/[0-9]/.test(src[i+1]||'')) || (c==='-'&&/[0-9]/.test(src[i+1]||'')&&!/[A-Za-z0-9.)\]]/.test((src[i-1]||' ').trim()||' '))){
        let j=i; if(src[j]==='-')j++; while(j<n && /[0-9.eE]/.test(src[j])) j++;
        // allow number vectors 1 2 3
        while(src[j]===' ' && (/[0-9]/.test(src[j+1]||'')||(src[j+1]==='-'&&/[0-9.]/.test(src[j+2]||'')))){ j++; if(src[j]==='-')j++; while(j<n&&/[0-9.eE]/.test(src[j]))j++; }
        push('num',src.slice(i,j)); i=j; continue;
      }
      if(/[A-Za-z]/.test(c)){ let j=i; while(j<n && /[A-Za-z0-9.]/.test(src[j])) j++; const nm=src.slice(i,j);
        push(BUILTINS.has(nm)?'kw':'var',nm); i=j; continue; }
      if(c==="'"&&src[i+1]===':'){push('adv',"':");i+=2;continue;}
      if((c==='/'||c==='\\')&&src[i+1]===':'){push('adv',c+':');i+=2;continue;}
      if(c==="'"||c==='/'||c==='\\'){push('adv',c);i++;continue;}
      if(c===':'&&src[i+1]===':'){push('verb','::');i+=2;continue;}
      if(VERBCH.indexOf(c)>=0){push('verb',c);i++;continue;}
      if('()[]{}'.indexOf(c)>=0){push('brk',c);i++;continue;}
      if(c===';'){push('brk',';');i++;continue;}
      push(null,c); i++;
    }
    return out+'\n';
  }

  // ---------- value rendering ----------
  function renderValue(container, res){
    container.innerHTML='';
    let any=false;
    if(res.out && res.out.length){
      const pre=document.createElement('pre'); pre.className='console';
      pre.textContent=res.out.join('\n'); container.appendChild(pre); any=true;
    }
    if(res.error){ const e=document.createElement('div'); e.className='err'; e.textContent="'"+res.error; container.appendChild(e); any=true; }
    else if(res.value && res.value.t!=='u'){
      const d=A.describe(res.value);
      const node=renderDescribe(d);
      if(node){ container.appendChild(node); any=true; }
    }
    container.classList.toggle('empty', !any);
  }
  function cell(txt,cls){const td=document.createElement('td'); if(cls)td.className=cls; td.textContent=txt; return td;}
  function attrBadge(a){ if(!a)return ''; return `<span class="att">${a}</span>`; }
  function renderDescribe(d){
    if(d.kind==='unit') return null;
    if(d.kind==='text'){ const pre=document.createElement('pre'); pre.className='ret'; pre.textContent=d.text; return pre; }
    if(d.kind==='dict'){
      const t=document.createElement('table'); t.className='grid dictgrid';
      for(let i=0;i<d.keys.length;i++){ const tr=document.createElement('tr');
        tr.appendChild(cell(d.keys[i],'k')); tr.appendChild(cell(d.vals[i], d.valign?'r':'')); t.appendChild(tr); }
      return t;
    }
    if(d.kind==='table'){
      const t=document.createElement('table'); t.className='grid';
      const thead=document.createElement('tr');
      d.cols.forEach((c,i)=>{ const th=document.createElement('th'); if(d.align[i])th.className='r';
        th.innerHTML=esc(c)+attrBadge(d.attrs[i]); thead.appendChild(th); });
      t.appendChild(thead);
      const nrows=d.rows.length, cap=300;
      for(let r=0;r<Math.min(nrows,cap);r++){ const tr=document.createElement('tr');
        d.rows[r].forEach((v,i)=>tr.appendChild(cell(v,d.align[i]?'r':''))); t.appendChild(tr); }
      const wrap=document.createElement('div');
      wrap.appendChild(t);
      if(nrows>cap){ const m=document.createElement('div'); m.className='note'; m.textContent=`… ${nrows-cap} more rows (${nrows} total)`; wrap.appendChild(m); }
      else { const m=document.createElement('div'); m.className='typ'; m.textContent=`${nrows} row${nrows===1?'':'s'} · ${d.cols.length} cols`; wrap.appendChild(m); }
      return wrap;
    }
    if(d.kind==='keyed'){
      const t=document.createElement('table'); t.className='grid';
      const thead=document.createElement('tr');
      d.kcols.forEach((c,i)=>{ const th=document.createElement('th'); th.className=(d.kalign[i]?'r ':'')+'keyw';
        th.innerHTML=esc(c)+attrBadge(d.kattrs[i]); thead.appendChild(th); });
      d.vcols.forEach((c,i)=>{ const th=document.createElement('th'); if(d.valign[i])th.className='r';
        th.innerHTML=esc(c)+attrBadge(d.vattrs[i]); thead.appendChild(th); });
      t.appendChild(thead);
      const nrows=d.krows.length, cap=300;
      for(let r=0;r<Math.min(nrows,cap);r++){ const tr=document.createElement('tr');
        d.krows[r].forEach((v,i)=>{ const c=cell(v,(d.kalign[i]?'r ':'')+'keyw'); tr.appendChild(c); });
        d.vrows[r].forEach((v,i)=>tr.appendChild(cell(v,d.valign[i]?'r':''))); t.appendChild(tr); }
      const wrap=document.createElement('div'); wrap.appendChild(t);
      const m=document.createElement('div'); m.className='typ';
      m.textContent=`${nrows} row${nrows===1?'':'s'} · keyed ${d.kcols.length}!${d.vcols.length}`; wrap.appendChild(m);
      if(nrows>cap){ const mm=document.createElement('div'); mm.className='note'; mm.textContent=`… ${nrows-cap} more rows`; wrap.appendChild(mm);}
      return wrap;
    }
    return null;
  }

  // ---------- cell object ----------
  function makeCell(src){
    const id=++uid;
    const el=document.createElement('div'); el.className='cell'; el.dataset.id=id;
    el.innerHTML=`
      <div class="cellhead">
        <div class="runbtn" title="run (Ctrl+Enter)">▶</div>
        <span class="idx"></span>
        <div class="chead-sp"></div>
        <button class="mini up" title="move up">↑</button>
        <button class="mini down" title="move down">↓</button>
        <button class="mini add" title="add cell below">＋</button>
        <button class="mini del" title="delete cell">✕</button>
      </div>
      <div class="editor">
        <pre class="hl"></pre>
        <textarea spellcheck="false" autocapitalize="off" autocomplete="off" wrap="soft"></textarea>
      </div>
      <div class="out empty"></div>`;
    const ta=el.querySelector('textarea');
    const hl=el.querySelector('.hl');
    const out=el.querySelector('.out');
    const obj={id,el,ta,hl,out};
    ta.value=src||'';
    function sync(){ hl.innerHTML=highlight(ta.value); ta.style.height='auto'; ta.style.height=(ta.scrollHeight)+'px'; }
    ta.addEventListener('input',sync);
    ta.addEventListener('scroll',()=>{hl.scrollTop=ta.scrollTop;});
    ta.addEventListener('keydown',e=>{
      if(e.key==='Enter' && (e.shiftKey||e.metaKey||e.ctrlKey)){ e.preventDefault();
        runCell(obj);
        if(e.shiftKey && !(e.metaKey||e.ctrlKey)){ const idx=cells.indexOf(obj);
          if(idx===cells.length-1){ const c=addCell('',idx); c.ta.focus(); } else { cells[idx+1].ta.focus(); } }
      }
    });
    el.querySelector('.runbtn').onclick=()=>runCell(obj);
    el.querySelector('.add').onclick=()=>{ const idx=cells.indexOf(obj); const c=addCell('',idx); c.ta.focus(); };
    el.querySelector('.del').onclick=()=>removeCell(obj);
    el.querySelector('.up').onclick=()=>moveCell(obj,-1);
    el.querySelector('.down').onclick=()=>moveCell(obj,1);
    obj.sync=sync; obj.run=()=>runCell(obj);
    setTimeout(sync,0);
    return obj;
  }
  function addCell(src,afterIdx){
    const obj=makeCell(src);
    if(afterIdx===undefined || afterIdx>=cells.length-1){ cells.push(obj); cellsEl.appendChild(obj.el); }
    else { cells.splice(afterIdx+1,0,obj); cellsEl.insertBefore(obj.el, cells[afterIdx+2] ? cells[afterIdx+2].el : null); }
    reindex(); return obj;
  }
  function removeCell(obj){ const i=cells.indexOf(obj); if(i<0)return; cells.splice(i,1); obj.el.remove();
    if(cells.length===0) addCell(''); reindex(); }
  function moveCell(obj,dir){ const i=cells.indexOf(obj); const j=i+dir; if(j<0||j>=cells.length)return;
    cells.splice(i,1); cells.splice(j,0,obj);
    cellsEl.innerHTML=''; cells.forEach(c=>cellsEl.appendChild(c.el)); reindex(); obj.ta.focus(); }
  function reindex(){ cells.forEach((c,i)=>c.el.querySelector('.idx').textContent='['+(i+1)+']');
    document.getElementById('stCells').textContent=cells.length; }

  function runCell(obj){
    const res=A.run(obj.ta.value);
    renderValue(obj.out,res);
    updateVars();
  }
  function runAll(){ cells.forEach(runCell); }

  function updateVars(){
    const root=A._root.vars; const names=Object.keys(root);
    const el=document.getElementById('stVars');
    el.textContent = names.length? names.slice(0,10).join(' ')+(names.length>10?' …':'') : '·';
  }

  // ---------- toolbar ----------
  document.getElementById('runall').onclick=runAll;
  document.getElementById('addcell').onclick=()=>{ const c=addCell(''); c.ta.focus(); };
  document.getElementById('clearout').onclick=()=>cells.forEach(c=>{c.out.innerHTML='';c.out.classList.add('empty');});
  document.getElementById('resetenv').onclick=()=>{ A.reset(); updateVars(); flash('environment reset'); };
  document.getElementById('loaddemo').onclick=loadDemo;
  const side=document.getElementById('side');
  document.getElementById('toghelp').onclick=()=>side.classList.toggle('hidden');

  function flash(msg){ const s=document.querySelector('.status span:nth-child(2)'); const old=s.textContent; s.textContent=msg; setTimeout(()=>s.textContent=old,1400); }

  // ---------- sidebar ----------
  function buildSide(){
    const S=[];
    S.push(`<h2>examples</h2>`);
    const ex=[
      ['vectors', '2 3 4 * 10 20 30'],
      ['range → sum', 'sum til 100'],
      ['right-to-left', '2 * 3 + 4'],
      ['a table', '([]sym:`AAPL`MSFT`GOOG; px:187.3 411.2 92.5; sz:100 250 50)'],
      ['meta + attrs', 'meta ([]t:asc 1 2 3; s:`a`b`c)'],
      ['group by', 't:([]s:`a`b`a`b`a; v:1 2 3 4 5)\nqby[t; `s; `n`sum!({#x`v};{sum x`v})]'],
      ['as-of join', 'gentq 2000\n5 # aj[`sym`time; trades; quotes]'],
      ['1-min OHLCV bars', 'gentq 2000\nbars[1; trades]'],
      ['VWAP by symbol', 'gentq 2000\nqby[trades; `sym; (,`vwap)!,{wavg[x`sz;x`px]}]'],
      ['O(1) symbol slice', 'gentq 3000\ng:bysym trades\nsymrows[trades; g; `AAPL]'],
      ['moving average', 'movavg[3; 10 11 9 12 15 14]'],
      ['sorted → attribute', '`at asc 5 3 8 1'],
    ];
    ex.forEach(([label,code])=>{
      S.push(`<button class="snip" data-code="${encodeURIComponent(code)}"><span class="cm">/ ${label}</span>\n${esc(code)}</button>`);
    });

    S.push(`<h2>verbs</h2>`);
    const verbs=[
      ['+ - * %','add sub mul div (÷ → float)'],['! ','enum / dict / mod'],['&amp; |','where·min / reverse·max'],
      ['&lt; &gt; =','grade / compare / group'],['# _','take·reshape / drop·cut'],['^ ,','fill·without / concat·enlist'],
      ['$ ?','string·cast / distinct·find'],['@ .','type·apply / value·apply-n'],['~','match / not']
    ];
    verbs.forEach(([a,b])=>S.push(`<div class="ref"><b>${a}</b> — ${b}</div>`));

    S.push(`<h2>adverbs</h2>`);
    [['f/','over (fold)'],['f\\','scan'],["f'",'each'],["f':",'each-prior'],['f/:','each-right'],['f\\:','each-left']]
      .forEach(([a,b])=>S.push(`<div class="ref"><b>${esc(a)}</b> — ${b}</div>`));

    S.push(`<h2>vocabulary</h2>`);
    S.push(`<div class="sub">aggregate</div><div class="note">sum prd min max avg med dev var sdev wsum wavg cor cov all any</div>`);
    S.push(`<div class="sub">uniform</div><div class="note">sums prds mins maxs deltas ratios differ prev next rank</div>`);
    S.push(`<div class="sub">list / order</div><div class="note">til enlist reverse distinct where group flip asc desc iasc idesc raze first last count</div>`);
    S.push(`<div class="sub">sets · strings</div><div class="note">in except inter union cross sublist rotate · lower upper trim ss ssr sv vs like</div>`);

    S.push(`<h2>tables &amp; qSQL</h2>`);
    S.push(`<div class="note"><b>([]c:v;…)</b> table · <b>([k:v]c:v)</b> keyed · meta · cols · xkey · xasc · xgroup</div>`);
    S.push(`<div class="note">qwhere[t;mask] · qselect[t;n!f] · qby[t;by;n!f]</div>`);
    S.push(`<div class="note">joins: lj ij uj · aj[c;x;y] as-of · taq[tr;qu]</div>`);

    S.push(`<h2>attributes</h2>`);
    S.push(`<div class="note"><b>\`sa</b> sorted · <b>\`ua</b> unique · <b>\`pa</b> parted · <b>\`ga</b> grouped · <b>\`at</b> reads it. <b>asc</b>/<b>xasc</b> set <b>\`s</b>; <b>meta</b> shows the <b>a</b> column.</div>`);

    S.push(`<h2>finance (fin)</h2>`);
    S.push(`<div class="note"><b>gentq n</b> → globals <b>trades</b>,<b>quotes</b>. mid spread spreadbps micro imbal · vwap twap tsign signedvol effspread · ret logret rvol movavg ema rollstd · bars symstats · bysym symrows gidx.</div>`);

    S.push(`<h2>notes</h2>`);
    S.push(`<div class="note">Evaluation is right-to-left, no precedence: <b>2*3+4 → 14</b>. Two-arg library functions take brackets: <b>aj[c;x;y]</b>. A bare table renders as a grid — no <b>show</b> needed. This is a working subset of Amber running in your browser.</div>`);

    side.innerHTML=S.join('');
    side.querySelectorAll('.snip').forEach(b=>b.onclick=()=>{
      const code=decodeURIComponent(b.dataset.code); const c=addCell(code); c.sync(); c.run();
      c.el.scrollIntoView({behavior:'smooth',block:'center'});
    });
  }

  // ---------- demo notebook ----------
  const DEMO=[
`/ Welcome to Amber — a columnar array language.
/ Press Shift+Enter to run a cell (Ctrl+Enter to run in place).
2 3 4 * 10 20 30`,
`/ evaluation is right to left, with no operator precedence
2 * 3 + 4`,
`/ ranges, aggregation, adverbs
sum til 100`,
`/ tables are first class — a bare table renders as a grid
([]sym:\`AAPL\`MSFT\`GOOG\`AMZN; px:187.3 411.2 92.5 138.1; sz:100 250 50 300)`,
`/ meta shows column types AND attributes (the a column)
meta ([]time:asc 3 1 2 4; sym:\`a\`b\`a\`b; px:1.5 2.5 3.5 4.5)`,
`/ generate a market session: sets globals trades & quotes
/ time gets the \`s sorted attribute, sym gets \`p parted
gentq 2000
meta trades`,
`/ the join every tick shop needs — as-of (prevailing quote per trade)
5 # aj[\`sym\`time; trades; quotes]`,
`/ VWAP and trade count by symbol (qSQL group-by)
qby[trades; \`sym; \`n\`vwap!({#x\`px}; {wavg[x\`sz;x\`px]})]`,
`/ 1-minute OHLCV bars
bars[1; trades]`,
`/ O(1) per-symbol slice via a group index
g:bysym trades
symrows[trades; g; \`AAPL]`
  ];
  function loadDemo(){ cells.forEach(c=>c.el.remove()); cells=[]; DEMO.forEach(s=>addCell(s)); reindex();
    cells.forEach(runCell); flash('demo loaded'); window.scrollTo(0,0); }

  // ---------- boot ----------
  buildSide();
  // paint the shell first, then load & run the demo so the page is instantly interactive
  addCell('/ loading demo…');
  reindex();
  setTimeout(loadDemo, 30);
  updateVars();
})();
</script>
</body>
</html>
